function loadDB(){try{const r=localStorage.getItem(DB_KEY);if(!r)return null;const d=JSON.parse(r);if(d.signatures)d.signatures=cleanSigs(d.signatures);if(!d.unitItems||Object.keys(d.unitItems).length===0) d.unitItems={...IMPORTED_UNIT_ITEMS};return d;}catch(e){return null;}}
// נקה assigned מתוך signatures (Firebase לא אוהב מפתחות עם נקודות)
function cleanSigs(sigs){
  if(!sigs) return {};
  const out={};
  Object.entries(sigs).forEach(([id,sig])=>{
    const {assigned:_,...rest}=sig||{};
    out[id]=rest;
  });
  return out;
}
function saveDB(db){
  const safe={assignments:{},signatures:{},customSoldiers:{},brokenItems:[],bulkGuarantors:{},userPerms:{},dynamicUsers:{},unitItems:{},...db};
  try{localStorage.setItem(DB_KEY,JSON.stringify(safe));}catch(e){}
  fbSet("db/assignments", safe.assignments).catch(e=>console.warn("FB err:",e));
  fbSet("db/signatures", cleanSigs(safe.signatures)).catch(e=>console.warn("FB err:",e));
  fbSet("db/customSoldiers", safe.customSoldiers).catch(e=>console.warn("FB err:",e));
  fbSet("db/brokenItems", safe.brokenItems).catch(e=>console.warn("FB err:",e));
  fbSet("db/bulkGuarantors", safe.bulkGuarantors).catch(e=>console.warn("FB err:",e));
  fbSet("db/userPerms", safe.userPerms).catch(e=>console.warn("FB err:",e));
  fbSet("db/dynamicUsers", safe.dynamicUsers).catch(e=>console.warn("FB err:",e));
  fbSet("db/unitItems", safe.unitItems).catch(e=>console.warn("FB err:",e));
}
function initDB(){
  const local=loadDB();
  const empty={assignments:{},signatures:{},customSoldiers:{},bulkGuarantors:{},unitItems:{...IMPORTED_UNIT_ITEMS}};
  if(local){
    // סנכרן את ה-localStorage ל-Firebase בהתחלה
    fbSet("db/assignments", local.assignments||{}).catch(()=>{});
    fbSet("db/signatures", local.signatures||{}).catch(()=>{});
    fbSet("db/customSoldiers", local.customSoldiers||{}).catch(()=>{});
    return local;
  }
  return empty;
}

function SerialPicker({itemName, value, onChange, db}){
  const [query, setQuery] = useState(value||"");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  // כל הסידוריים המשויכים כרגע לחיילים (DB גובר על RAW)
  const usedSerials = useMemo(()=>{
    const used = new Set();
    // קודם כל RAW_SOLDIERS
    RAW_SOLDIERS.forEach(s=>{
      // אם יש override ב-DB נתעלם מה-RAW
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    // חיילים מותאמים אישית
    Object.values(db.customSoldiers||{}).forEach(s=>{
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    // פריטי מלאי גדודי
    Object.values(db.unitItems||{}).forEach(item=>{ if(item.serial&&String(item.serial).length>3) used.add(Number(item.serial)); });
    return used;
  },[db]);

  // סידוריים זמינים לאמצעי זה
  const available = useMemo(()=>{
    if(!itemName) return [];
    const name = itemName.trim();
    const result = ALL_SERIALS
      .filter(s=>s.name.trim()===name && !usedSerials.has(s.serial))
      .map(s=>s.serial);
    return result;
  },[itemName, usedSerials]);

  // סידוריים שמתאימים לחיפוש
  const filtered = useMemo(()=>{
    const q = query.trim();
    if(!q) return available.slice(0,80);
    return available.filter(s=>String(s).includes(q)).slice(0,80);
  },[available, query]);

  useEffect(()=>{
    function handleClick(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",handleClick);
    return ()=>document.removeEventListener("mousedown",handleClick);
  },[]);

  function select(serial){
    onChange(String(serial));
    setQuery(String(serial));
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1}}>
      <div style={{display:"flex",gap:4}}>
        <input
          value={query}
          onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          placeholder={available.length>0?`${available.length} זמינים...`:"הזן סידורי"}
          style={{...S.input,marginBottom:0,flex:1}}
          inputMode="numeric"
        />
        <button onClick={()=>setOpen(o=>!o)} type="button"
          style={{...S.btn(available.length>0?"blue":"gray"),padding:"6px 10px",flexShrink:0,fontSize:12,minWidth:52}}>
          {available.length>0?`▾ ${available.length}`:"▾ 0"}
        </button>
      </div>
      {open&&available.length>0&&(
        <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#0d1117",border:"1px solid #388bfd",borderRadius:8,zIndex:100,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.6)"}}>
          <div style={{padding:"6px 10px",borderBottom:"1px solid #21262d",fontSize:11,color:"#8b949e"}}>
            {available.length} זמינים בנשקייה • {ALL_SERIALS.filter(s=>s.name.trim()===(itemName||"").trim()).length} סה"כ
          </div>
          {filtered.map(serial=>(
            <div key={serial} onClick={()=>select(serial)}
              style={{padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"monospace",borderBottom:"1px solid #161b22"}}
              onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {serial}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SignaturePad({onSave}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const last=useRef(null);
  const [hasStrokes,setHasStrokes]=useState(false);
  function pos(e,canvas){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};
  }
  function start(e){e.preventDefault();drawing.current=true;last.current=pos(e,canvasRef.current);}
  function move(e){
    e.preventDefault();if(!drawing.current)return;
    const c=canvasRef.current,ctx=c.getContext("2d"),p=pos(e,c);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="#3fb950";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();
    last.current=p;setHasStrokes(true);
  }
  function end(e){e.preventDefault();drawing.current=false;}
  function clear(){canvasRef.current.getContext("2d").clearRect(0,0,500,150);setHasStrokes(false);}
  return (
    <div>
      <div style={{border:"2px dashed #30363d",borderRadius:10,background:"#0d1117",touchAction:"none",marginBottom:10,position:"relative"}}>
        {!hasStrokes&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#484f58",fontSize:13,pointerEvents:"none"}}>✍️ חתום כאן באצבע</div>}
        <canvas ref={canvasRef} width={500} height={150} style={{width:"100%",height:150,display:"block",borderRadius:8,cursor:"crosshair"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={clear} style={{...S.btn("red"),flex:1}}>🗑️ נקה</button>
        <button onClick={()=>hasStrokes&&onSave(canvasRef.current.toDataURL())} disabled={!hasStrokes} style={{...S.btn("green"),flex:2,opacity:hasStrokes?1:0.4}}>✅ אשר חתימה</button>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [dynUsers,setDynUsers]=useState(loadDB()?.dynamicUsers||{});
  const [loading,setLoading]=useState(true);
  // טען משתמשים דינמיים מ-Firebase
  useEffect(()=>{
    const off = fbOn("db/dynamicUsers",(users)=>{
      if(users){
        setDynUsers(users);
        try{
          const local=loadDB()||{};
          localStorage.setItem("armory_9219_v4",JSON.stringify({...local,dynamicUsers:users}));
        }catch(e){}
      }
      setLoading(false);
    });
    setTimeout(()=>setLoading(false),6000); // timeout
    return ()=>off();
  },[]);
  function go(){
    const uTrim=user.trim();
    const pTrim=pass.trim();
    if(!uTrim||!pTrim){setErr("נא למלא שם ומספר אישי");return;}
    const u=USERS[uTrim]||dynUsers[uTrim];
    if(u && (pTrim===u.pass || pTrim===String(u.pass))){
      onLogin({
        role:u.role,
        name:u.name,
        username:uTrim,
        soldierId:u.soldierId||"",
        viewUnit:u.viewUnit||null
      });
      return;
    }
    // בדוק חייל — שם פרטי + מספר אישי
    const s=RAW_SOLDIERS.find(x=>x.id===pTrim);
    if(s && (s.name.split(" ")[0]===uTrim||s.name.includes(uTrim)||uTrim===pTrim)){
      onLogin({role:"soldier",name:s.name,soldierId:s.id});
      return;
    }
    // fallback: חייל עם מספר אישי בשני השדות
    const byId=RAW_SOLDIERS.find(x=>x.id===uTrim);
    if(byId && pTrim===uTrim){
      onLogin({role:"soldier",name:byId.name,soldierId:byId.id});
      return;
    }
    // חייל מותאם אישית
    const local=loadDB()||{};
    const customSols=Object.values(local.customSoldiers||{});
    const cs=customSols.find(x=>x.id===pTrim&&(x.name.split(" ")[0]===uTrim||x.name.includes(uTrim)||uTrim===pTrim));
    if(cs){
      onLogin({role:"soldier",name:cs.name,soldierId:cs.id});
      return;
    }
    if(loading){
      setErr("המערכת עדיין נטענת, נסה שוב עוד שניה");
    } else {
      setErr("שם משתמש או מספר אישי שגויים");
    }
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d1117"}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380,boxShadow:"0 24px 48px rgba(0,0,0,.6)"}}>

function SoldierSignView({auth,onLogout,db,setDb}){
  const soldier=RAW_SOLDIERS.find(s=>s.id===auth.soldierId);
  const sig=db.signatures?.[auth.soldierId];
  const assigned=auth.assignedFromLink&&Object.keys(auth.assignedFromLink).length>0?auth.assignedFromLink:(db.assignments?.[auth.soldierId]||soldier?.assigned||{});

  // האזנה ל-Firebase גם בצד החייל
  useEffect(()=>{
    const off1 = fbOn("db/signatures", (sigs)=>{
      setDb(prev=>({...prev, signatures: cleanSigs(sigs)}));
    });
    return ()=>{ off1(); };
  },[]);
  const [step,setStep]=useState(sig?"done":"review");
  const [sigImg,setSigImg]=useState(sig?.sigData||null);
  const [testImg,setTestImg]=useState(sig?.testImg||null);
  const [showTestUpload,setShowTestUpload]=useState(false);
  if(!soldier){
    // חייל מותאם אישית — צור אובייקט זמני
    const customSoldier = Object.values(db.customSoldiers||{}).find(s=>s.id===auth.soldierId);
    if(!customSoldier) return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#f85149",flexDirection:"column",gap:10}}><div style={{fontSize:40}}>⚠️</div><div>חייל לא נמצא במערכת</div><div style={{fontSize:12,color:"#8b949e"}}>מ.א: {auth.soldierId}</div></div>;
  }
  const soldierData = soldier || Object.values(db.customSoldiers||{}).find(s=>s.id===auth.soldierId) || {id:auth.soldierId,name:auth.name,unit:"—",phone:"—"};
  const items=Object.entries(assigned);
  const weapons=items.filter(([k])=>WEAPON_KEYS.includes(k));
  const accessories=items.filter(([k])=>!WEAPON_KEYS.includes(k));
  function doSign(sigData){
    const signedAt=todayStr()+" "+nowStr();
    // הסר מרשימת ערב מרוכז אם קיים
    const newGuarantors={...(db.bulkGuarantors||{})};

    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }

        </div>

      {soldier&&<div style={{background:"#0d1117",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13}}>✅ <strong>{soldier.name}</strong> • {Object.keys(assigned).length} פריטים</div>}

                {EQ_COLS.map(eq=><option key={eq} value={eq}>{eq}{getMakat(eq)?" ("+getMakat(eq)+")":""}</option>)}

      // check if already added via db
    }

  const [unit, setUnit] = useState("מסייעת");
  const [selectedIds, setSelectedIds] = useState([]);
  const [search, setSearch] = useState("");
  const [sigImg, setSigImg] = useState(null);
  const [showPad, setShowPad] = useState(false);
  const [done, setDone] = useState(false);

  const unitSoldiers = useMemo(()=>{
    const q=search.toLowerCase();
    return soldiers.filter(s=>s.unit===unit&&Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k)))
      .filter(s=>!q||s.name.toLowerCase().includes(q)||s.id.includes(q));
  },[soldiers,unit,search]);

  function toggleSoldier(id){
    setSelectedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  }
  function selectAll(){setSelectedIds(unitSoldiers.map(s=>s.id));}
  function clearAll(){setSelectedIds([]);}

  const selected = soldiers.filter(s=>selectedIds.includes(s.id));
  // Flatten all equipment from selected soldiers
  const allEquipment = [];
  selected.forEach(s=>{
    Object.entries(s.assigned||{}).forEach(([name,val])=>{
      allEquipment.push({soldierName:s.name,name,val});
    });
  });

  function doGroupSign(){
    if(!sigImg||selectedIds.length===0) return;
    const signedAt=todayStr()+" "+nowStr();
    const newSigs={...(db.signatures||{})};
    selectedIds.forEach(id=>{
      const s=soldiers.find(x=>x.id===id);
      if(s) newSigs[id]={sigData:sigImg,signedAt,groupSign:groupName||"שובר מרוכז"};
    });
    const ndb={...db,signatures:newSigs};
    saveDB(ndb);
    setDone(true);
  }

  const units=["א","ב","ג","מסייעת","אג\"מ","פלס\"מ"];

  return (
    <Modal title="✍️ שובר חתימה מרוכז" onClose={onClose} wide>
      {!done?(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={S.label}>שם השובר (אופציונלי)</label>
              <input value={groupName} onChange={e=>setGroupName(e.target.value)}
                placeholder="לדוגמה: שובר מסייעת מרץ" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>פלוגה</label>
              <select value={unit} onChange={e=>{setUnit(e.target.value);setSelectedIds([]);}} style={S.input}>
                {units.map(u=><option key={u} value={u}>{u}</option>)}
              </select>
            </div>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש בפלוגה..." style={{...S.input,flex:1,marginBottom:0}}/>
            <button onClick={selectAll} style={{...S.btn("blue"),padding:"7px 12px",fontSize:12,flexShrink:0}}>בחר הכל</button>
            <button onClick={clearAll} style={{...S.btn("red"),padding:"7px 12px",fontSize:12,flexShrink:0}}>נקה</button>
          </div>

          <div style={{background:"#0d1117",borderRadius:8,maxHeight:220,overflowY:"auto",marginBottom:14,border:"1px solid #21262d"}}>
            {unitSoldiers.length===0
              ?<div style={{padding:16,textAlign:"center",color:"#8b949e",fontSize:13}}>אין חיילים עם נשק בפלוגה זו</div>
              :unitSoldiers.map(s=>{
                const sel=selectedIds.includes(s.id);
                const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
                return (
                  <label key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid #161b22",background:sel?"#1a2f4a":"transparent"}}>
                    <input type="checkbox" checked={sel} onChange={()=>toggleSoldier(s.id)} style={{width:16,height:16}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{s.name} <span style={{color:"#484f58",fontSize:11}}>({s.id})</span></div>
                      <div style={{fontSize:11,color:"#8b949e"}}>{weps.map(([k])=>k).join(", ")}</div>
                    </div>
                    {db.signatures?.[s.id]&&<Badge color="green" small>✅</Badge>}
                  </label>
                );
              })
            }
          </div>

          {selectedIds.length>0&&(
            <div style={{...S.card,border:"1px solid #388bfd",marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#388bfd"}}>📋 סיכום שובר ({selectedIds.length} חיילים, {allEquipment.length} אמצעים)</div>
              <div style={{maxHeight:150,overflowY:"auto",fontSize:12}}>
                {selected.map(s=>(
                  <div key={s.id} style={{marginBottom:6}}>
                    <div style={{fontWeight:600,color:"#e6edf3"}}>{s.name}:</div>
                    <div style={{color:"#8b949e",paddingRight:12}}>
                      {Object.entries(s.assigned||{}).map(([n,v])=>`${n}${isSerial(v)?" ("+v+")":""}`).join(" • ")}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {selectedIds.length>0&&(
            <div>
              <label style={S.label}>חתימה אחת לכולם</label>
              {sigImg
                ?<div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
                  <img src={sigImg} style={{height:50,borderRadius:6,border:"1px solid #238636"}} alt="חתימה"/>
                  <button onClick={()=>{setSigImg(null);setShowPad(true);}} style={{...S.btn("orange"),fontSize:12}}>שנה</button>
                </div>
                :<button onClick={()=>setShowPad(true)} style={{...S.btn("orange"),width:"100%",padding:"11px 0",marginBottom:12}}>✍️ חתום כאן</button>
              }
              <button onClick={doGroupSign} disabled={!sigImg} style={{...S.btn("green"),width:"100%",padding:"13px 0",fontSize:15,opacity:sigImg?1:0.5}}>
                ✅ חתום על {selectedIds.length} חיילים
              </button>
            </div>
          )}
        </div>
      ):(
        <div style={{textAlign:"center",padding:20}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h3 style={{color:"#3fb950",fontSize:18,fontWeight:800,marginBottom:8}}>השובר נחתם!</h3>
          <p style={{color:"#8b949e",marginBottom:4}}>{selectedIds.length} חיילים חתמו במרוכז</p>
          <p style={{color:"#484f58",fontSize:12}}>{groupName||"שובר מרוכז"} • {todayStr()}</p>
          <button onClick={onClose} style={{...S.btn("green"),marginTop:16,padding:"10px 30px"}}>סגור</button>
        </div>
      )}
      {showPad&&<Modal title="חתימה מרוכזת" onClose={()=>setShowPad(false)}><SignaturePad onSave={d=>{setSigImg(d);setShowPad(false);}}/></Modal>}
    </Modal>
  );
}

function BrokenEquipmentTab({db, setDb, soldiers, auth}){
  const [items, setItems] = useState(()=>(db.brokenItems||[]));

  const [form, setForm] = useState({soldierSearch:"",soldierId:"",itemName:"",serial:"",note:"",severity:"בינוני"});
  const [filterSev, setFilterSev] = useState("הכל");

  // sync from db
  useEffect(()=>setItems(db.brokenItems||[]),[db.brokenItems]);

  function setF(k,v){setForm(p=>({...p,[k]:v}));}

  function addItem(){
    if(!form.itemName.trim()){return;}
    const newItem={
      id:Date.now()+"",
      soldierId:form.soldierId,
      soldierName:soldiers.find(s=>s.id===form.soldierId)?.name||"—",
      itemName:form.itemName.trim(),
      serial:form.serial.trim(),
      note:form.note.trim(),
      severity:form.severity,
      reportedAt:todayStr()+" "+nowStr(),
      reportedBy:auth.name,
      status:"פתוח",
    };
    const updated=[newItem,...items];
    const ndb={...db, brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
    setForm({soldierSearch:"",soldierId:"",itemName:"",serial:"",note:"",severity:"בינוני"});
    setShowForm(false);
  }

  function closeItem(id){
    const updated=items.map(i=>i.id===id?{...i,status:"סגור",closedAt:todayStr()}:i);
    const ndb={...db,brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
  }

  function deleteItem(id){
    const updated=items.filter(i=>i.id!==id);
    const ndb={...db,brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
  }

  const shown = filterSev==="הכל" ? items : items.filter(i=>i.severity===filterSev);
  const openCount = items.filter(i=>i.status==="פתוח").length;

  const [soldierSuggestions, setSoldierSuggestions]=useState([]);
  function onSoldierSearch(v){
    setF("soldierSearch",v);setF("soldierId","");
    if(!v.trim()){setSoldierSuggestions([]);return;}
    const q=v.toLowerCase();
    setSoldierSuggestions(soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6));
  }

  const sevColors={קל:"blue",בינוני:"orange",חמור:"red"};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:0,fontSize:20,fontWeight:800}}>🔧 אמצעי תקול</h2>
          {openCount>0&&<div style={{color:"#f85149",fontSize:13,marginTop:2}}>{openCount} תקלות פתוחות</div>}
        </div>
        <button onClick={()=>setShowForm(true)} style={{...S.btn("orange")}}>+ דווח תקלה</button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {["הכל","פתוח","סגור"].map(s=>(
          <button key={s} onClick={()=>setFilterSev(s)}
            style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:13,fontWeight:600,
              borderColor:filterSev===s?"#e3b341":"#30363d",background:filterSev===s?"#3d2a1a":"#0d1117",
              color:filterSev===s?"#e3b341":"#8b949e"}}>{s}</button>
        ))}
      </div>

      {shown.length===0
        ?<div style={{...S.card,textAlign:"center",padding:32,color:"#8b949e"}}>
          <div style={{fontSize:40,marginBottom:8}}>🔧</div>
          <div>אין דיווחי תקלה</div>
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {shown.map(item=>(
            <div key={item.id} style={{...S.card,marginBottom:0,border:`1px solid ${item.status==="סגור"?"#21262d":item.severity==="חמור"?"#6e2020":item.severity==="בינוני"?"#5a3e1b":"#1f3a5f"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:15}}>{item.itemName}</span>
                    {item.serial&&<span style={{fontFamily:"monospace",fontSize:12,color:"#8b949e"}}>{item.serial}</span>}
                    <Badge color={sevColors[item.severity]||"gray"} small>{item.severity}</Badge>
                    <Badge color={item.status==="סגור"?"green":"orange"} small>{item.status}</Badge>
                  </div>
                  {item.soldierName&&item.soldierName!=="—"&&(
                    <div style={{fontSize:12,color:"#8b949e",marginBottom:4}}>👤 {item.soldierName} ({item.soldierId})</div>
                  )}
                  {item.note&&<div style={{fontSize:13,color:"#e6edf3",background:"#0d1117",borderRadius:6,padding:"6px 10px",marginBottom:4}}>{item.note}</div>}
                  <div style={{fontSize:11,color:"#484f58"}}>
                    דווח ע"י {item.reportedBy} • {item.reportedAt}
                    {item.closedAt&&<span> • נסגר: {item.closedAt}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {item.status==="פתוח"&&<button onClick={()=>closeItem(item.id)} style={{...S.btn("green"),padding:"5px 10px",fontSize:12}}>✅ סגור</button>}
                  <button onClick={()=>deleteItem(item.id)} style={{...S.btn("red"),padding:"5px 10px",fontSize:12}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      }

      {showForm&&(
        <Modal title="דיווח אמצעי תקול" onClose={()=>setShowForm(false)} wide>
          <div style={{position:"relative",marginBottom:8}}>
            <label style={S.label}>חייל (אופציונלי)</label>
            <input value={form.soldierSearch} onChange={e=>onSoldierSearch(e.target.value)}
              placeholder="חיפוש שם / מספר אישי..." style={S.input}/>
            {soldierSuggestions.length>0&&!form.soldierId&&(
              <div style={{background:"#0d1117",border:"1px solid #388bfd",borderRadius:8,marginTop:-8,marginBottom:8}}>
                {soldierSuggestions.map(s=>(
                  <div key={s.id} onClick={()=>{setF("soldierSearch",s.name);setF("soldierId",s.id);setSoldierSuggestions([]);}}
                    style={{padding:"8px 12px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #161b22"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    {s.name} <span style={{color:"#8b949e"}}>{s.id} • פלוגה {s.unit}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={S.label}>שם האמצעי *</label>
              <select value={form.itemName} onChange={e=>setF("itemName",e.target.value)} style={S.input}>
                <option value="">— בחר אמצעי —</option>
                {EQ_COLS.map(eq=><option key={eq} value={eq}>{eq}</option>)}
              </select>
            </div>
            <div>
              <label style={S.label}>מספר סידורי</label>
              <input value={form.serial} onChange={e=>setF("serial",e.target.value)}
                placeholder="מספר סידורי" style={S.input} inputMode="numeric"/>
            </div>
          </div>
          <label style={S.label}>חומרה</label>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {["קל","בינוני","חמור"].map(sev=>(
              <button key={sev} onClick={()=>setF("severity",sev)}
                style={{flex:1,padding:"8px 0",borderRadius:8,border:"1.5px solid",cursor:"pointer",fontWeight:600,fontSize:13,
                  borderColor:form.severity===sev?"#388bfd":"#30363d",
                  background:form.severity===sev?"#1f3a5f":"#0d1117",
                  color:form.severity===sev?"#388bfd":"#8b949e"}}>{sev}</button>
            ))}
          </div>
          <label style={S.label}>תיאור התקלה</label>
          <textarea value={form.note} onChange={e=>setF("note",e.target.value)}
            placeholder="תאר את התקלה בפירוט..." style={{...S.input,height:90,resize:"vertical"}}/>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button onClick={addItem} disabled={!form.itemName} style={{...S.btn("orange"),flex:2,padding:"11px 0",opacity:form.itemName?1:0.5}}>🔧 דווח תקלה</button>
            <button onClick={()=>setShowForm(false)} style={{...S.btn(),flex:1}}>ביטול</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ManagerApp({auth,onLogout}){
  const [db,setDb]=useState(()=>initDB());
  const [tab,setTab]=useState("dashboard");
  const [lastRefresh,setLastRefresh]=useState(new Date());
  const [dashModal,setDashModal]=useState(null); // "signed" | "unsigned" | "withWeapon" | "all"
  const [searchModal,setSearchModal]=useState(false);
  const [dashUnitFilter,setDashUnitFilter]=useState("הכל");

  // רענון אוטומטי כל 60 שניות
  useEffect(()=>{
    const interval=setInterval(()=>{
      setLastRefresh(new Date());
    },60000);
    return ()=>clearInterval(interval);
  },[]);

  // האזנה ל-Firebase בזמן אמת
  useEffect(()=>{
    const off1 = fbOn("db/signatures", (sigs)=>{
      setDb(prev=>{
        const updated={...prev, signatures: cleanSigs(sigs)};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off2 = fbOn("db/assignments", (assignments)=>{
      setDb(prev=>{
        const updated={...prev, assignments: assignments||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off3 = fbOn("db/customSoldiers", (custom)=>{
      setDb(prev=>{
        const updated={...prev, customSoldiers: custom||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off4 = fbOn("db/brokenItems", (broken)=>{
      setDb(prev=>{
        const updated={...prev, brokenItems: broken||[]};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off5 = fbOn("db/bulkGuarantors", (guarantors)=>{
      setDb(prev=>({...prev, bulkGuarantors: guarantors||{}}));
    });
    const off6 = fbOn("db/userPerms", (perms)=>{
      setDb(prev=>({...prev, userPerms: perms||{}}));
    });
    const off7 = fbOn("db/dynamicUsers", (dynUsers)=>{
      setDb(prev=>({...prev, dynamicUsers: dynUsers||{}}));
    });
    const off8 = fbOn("db/unitItems", (unitItems)=>{
      const items = unitItems||{};
      const itemCount = Object.keys(items).length;
      // If empty or old data (less than 500 items = old format), seed with new data
      if(itemCount < 1500){
        fbSet("db/unitItems", INITIAL_UNIT_ITEMS).catch(()=>{});
        setDb(prev=>({...prev, unitItems: INITIAL_UNIT_ITEMS}));
      } else {
        setDb(prev=>({...prev, unitItems: items}));
      }
    });
    return ()=>{ off1(); off2(); off3(); off4(); off5(); off6(); off7(); off8(); };
  },[]);
  const [search,setSearch]=useState("");
  const [filterUnit,setFilterUnit]=useState("הכל");
  const [selSoldier,setSelSoldier]=useState(null);
  const [dailyType,setDailyType]=useState(null);
  const [quickModal,setQuickModal]=useState(false);
  const [bulkModal,setBulkModal]=useState(false);
  const [mobileMenu,setMobileMenu]=useState(false);
  const [addModal,setAddModal]=useState(false);

  const units=useMemo(()=>["הכל",...[...new Set(RAW_SOLDIERS.map(s=>s.unit).filter(Boolean))].sort()],[]);
  const soldiers=useMemo(()=>{
    const assignments = db.assignments||{};
    const signatures = db.signatures||{};
    const customSoldiers = db.customSoldiers||{};
    const custom=Object.values(customSoldiers);
    const base=RAW_SOLDIERS.filter(s=>!customSoldiers[s.id]);
    const guarantors=db.bulkGuarantors||{};
    return [...custom,...base].map(s=>{
      const guarantee=Object.values(guarantors).find(g=>g.remaining&&g.remaining[s.id]);
      return {...s,assigned:assignments[s.id]??s.assigned,signature:signatures[s.id]?.sigData||null,signedAt:signatures[s.id]?.signedAt||null,guarantee:guarantee||null};
    });
  },[db]);
  const filtered=useMemo(()=>{let l=soldiers;if(filterUnit!=="הכל")l=l.filter(s=>s.unit===filterUnit);if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)||(s.squad||"").toLowerCase().includes(q));}return l;},[soldiers,filterUnit,search]);

  const withWeapons=useMemo(()=>soldiers.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k))).length,[soldiers]);
  const signedCount=useMemo(()=>soldiers.filter(s=>s.signature).length,[soldiers]);
  const unsigned=withWeapons-signedCount;

  function sendWhatsApp(soldier){
    const phone=phoneToWA(soldier.phone);
    if(!phone){alert("אין מספר טלפון לחייל זה");return;}
    const link="https://orenh943-cell.github.io/armory-9219";
    const assigned=soldier.assigned||{};
    const compactData={};
    Object.entries(assigned).forEach(([name,val])=>{
      const idx=EQ_COLS.indexOf(name);
      if(idx>=0) compactData[idx]=val;
    });
    // שימוש ב-btoa לקידוד קצר וללא תווים בעייתיים
    const encoded=btoa(JSON.stringify(compactData));
    const signLink=link+"?sign="+soldier.id+"&b="+encoded;
    const msg=`שלום ${soldier.name},\nנא לחתום על טופס ההחתמה האישי:\n${signLink}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
  }

  const tabs=[
    {id:"dashboard",label:"בקרה",icon:"🛡️"},
    {id:"soldiers",label:"חיילים",icon:"🪖"},
    {id:"signatures",label:"חתימות",icon:"✍️",badge:unsigned},
    {id:"signed",label:"חתומים",icon:"✅"},
    {id:"broken",label:"תקולים",icon:"🔧"},
    {id:"daily",label:"יומי",icon:"📋"},
    {id:"inventory",label:"מלאי",icon:"📦"},
    ...(auth.role==="admin"?[{id:"perms",label:"הרשאות",icon:"🔑"}]:[]),
    // viewer sees all tabs
  ];

  function Sidebar(){
    return (

function ViewerApp({auth, onLogout, db}){

  const soldiers=React.useMemo(()=>{
    const custom=Object.values(db.customSoldiers||{});
    const all=[...custom,...RAW_SOLDIERS];
    return all.map(s=>{
      const assigned=db.assignments?.[s.id]!==undefined?db.assignments[s.id]:s.assigned||{};
      const sig=db.signatures?.[s.id];
      return {...s,assigned,signature:!!sig};

    let l=soldiers;

    if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q));}
    return l;
  },[soldiers,filterUnit,search,auth.viewUnit]);

  const signed=filtered.filter(s=>s.signature).length;

    <div style={{minHeight:"100vh",background:"#0d1117",color:"#e6edf3",padding:16,fontFamily:"system-ui,sans-serif",direction:"rtl"}}>

function downloadBulkForm(repName, repId, unit, soldiers, sigData, db){
  const dateStr = todayStr();
  const unitLabel = unit==="הכל" ? "כל הגדוד" : "פלוגה "+unit;

  // סכם כמויות לפי אמצעי
  const itemMap = {}; // {name: {qty, serials: [], makat}}
  soldiers.forEach(s => {
    const assigned = db.assignments?.[s.id] ?? s.assigned ?? {};
    Object.entries(assigned).forEach(([name, serial]) => {
      if(!itemMap[name]) itemMap[name] = {qty:0, serials:[], makat: NAME_TO_MAKAT[name]||""};
      itemMap[name].qty++;
      if(serial && serial!==1 && serial!==true) itemMap[name].serials.push(String(serial));
    });
  });

  // מיין — קודם נשק, אחר כך אביזרים
  const weaponItems = Object.entries(itemMap).filter(([k])=>WEAPON_KEYS.includes(k));
  const accessoryItems = Object.entries(itemMap).filter(([k])=>!WEAPON_KEYS.includes(k));
  const allItems = [...weaponItems, ...accessoryItems];

  let rows = "";
  let totalQty = 0;
  allItems.forEach(([name, data], i) => {
    totalQty += data.qty;
    const serialsText = data.serials.length > 0 ? data.serials.join(", ") : "—";
    const isWeapon = WEAPON_KEYS.includes(name);
    rows += `<tr>
      <td style="text-align:center">${i+1}</td>
      <td style="${isWeapon?"font-weight:bold":""}">${name}</td>
      <td style="text-align:center;font-family:monospace;font-size:11px">${data.makat||"—"}</td>
      <td style="text-align:center;font-weight:bold;font-size:15px">${data.qty}</td>
      <td style="font-size:11px;color:#555">${serialsText}</td>
    </tr>`;
  });

  const sigHtml = sigData
    ? `<img src="${sigData}" style="height:70px;border:1px solid #ccc;border-radius:4px;display:block;margin-top:6px"/>`
    : `<div style="height:70px;border:1px solid #999;border-radius:4px;margin-top:6px;width:240px"></div>`;

  const html = `<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<title>טופס ערבות מרוכז — ${unitLabel} — ${dateStr}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;direction:rtl;color:#000;padding:20px;font-size:13px}
  .top{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a1a2e;padding-bottom:10px;margin-bottom:14px}

  .top .logo{font-size:28px}
  .info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .info-cell{background:#f4f4f4;border:1px solid #ddd;border-radius:5px;padding:7px 10px}
  .info-cell .lbl{font-size:10px;color:#777;margin-bottom:2px}
  .info-cell .val{font-size:14px;font-weight:bold}
  table{width:100%;border-collapse:collapse;margin-bottom:18px}
  thead tr{background:#1a1a2e;color:#fff}

  tbody tr:nth-child(even){background:#f9f9f9}

  .total-row td{background:#1a1a2e!important;color:#fff;font-weight:bold;padding:7px}
  .sig-row{display:flex;gap:16px;margin-bottom:16px}

  .stamp{width:110px;height:80px;border:2px dashed #bbb;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px}
  .disclaimer{font-size:11px;color:#444;border:1px solid #ddd;border-radius:5px;padding:9px 12px;margin-bottom:14px;line-height:1.7;background:#fafafa}
  .footer{font-size:10px;color:#999;text-align:center;margin-top:14px;border-top:1px solid #eee;padding-top:8px}
  @media print{.noprint{display:none!important}body{padding:10px}}
</style>
</head>

  אני מתחייב לוודא כי כל חייל יחתום בנפרד על טופס 1008 האישי שלו.

<table>

</table>

<div class="sig-row">
  <div class="sig-box" style="flex:2">
    <div class="sig-lbl">חתימת הנציג — ${repName}</div>
    ${sigHtml}
    <div class="sig-name">${repName} • מ.א ${repId||"—"} • ${dateStr}</div>
  </div>
  <div class="sig-box" style="flex:2">
    <div class="sig-lbl">חתימת קצין / מאשר</div>
    <div style="height:70px;border:1px solid #ccc;border-radius:4px;margin-top:6px"></div>
    <div class="sig-name">שם: _________________________ • תאריך: ___________</div>
  </div>
  <div class="sig-box" style="flex:1;display:flex;flex-direction:column;align-items:center">
    <div class="sig-lbl">חותמת יחידה</div>

<div class="footer">
  הופק ע"י מערכת ניהול נשקייה גדוד 9219 • ${dateStr} • ${repName} • ${unitLabel}

  <button onclick="window.print()" style="padding:10px 32px;font-size:15px;cursor:pointer;background:#1a1a2e;color:#fff;border:none;border-radius:8px">🖨️ הדפס / שמור PDF</button>

// =================== INVENTORY TAB (מלאי גדודי/פלוגתי) ===================
const UNIT_LIST = ["א","ב","ג","מסייעת","אגמ","פלסמ","גדודי","נעורה","חטיבה 6","פנוי"];
const UNIT_COLORS = {
  "א":"#388bfd","ב":"#a371f7","ג":"#3fb950","מסייעת":"#e3b341",
  "אגמ":"#f85149","פלסמ":"#58a6ff","גדודי":"#ff9500","נעורה":"#8b949e",
  "חטיבה 6":"#ff6b6b","פנוי":"#3fb950"
};

function InventoryTab({db, setDb, soldiers, auth}){
  const [filterUnit, setFilterUnit] = React.useState("הכל");
  const [filterType, setFilterType] = React.useState("הכל"); // הכל / soldier / unit
  const [filterName, setFilterName] = React.useState("");
  const [showAdd, setShowAdd] = React.useState(false);
  const [showTransfer, setShowTransfer] = React.useState(null);
  const [showAssign, setShowAssign] = React.useState(null);
  const [expandedItem2, setExpandedItem2] = React.useState(null);

  const items = Object.entries(db.unitItems||{});

  const filtered = React.useMemo(()=>{
    return items
      .filter(([,item])=>{
        const unitMatch = filterUnit==="הכל" || item.unit===filterUnit;
        const typeMatch = filterType==="הכל" || item.assignedType===filterType;
        const nameMatch = !filterName.trim() ||
          item.name.includes(filterName) ||
          String(item.serial||"").includes(filterName);
        return unitMatch && typeMatch && nameMatch;
      })
      .sort((a,b)=>{
        // Sort: by unit order, then by name
        const uOrder = ["א","ב","ג","מסייעת","אגמ","פלסמ","גדודי","נעורה","חטיבה 6","פנוי"];
        const ua = uOrder.indexOf(a[1].unit), ub = uOrder.indexOf(b[1].unit);
        if(ua!==ub) return ua-ub;
        return a[1].name.localeCompare(b[1].name, 'he');
      });
  },[items, filterUnit, filterType, filterName]);

  const stats = React.useMemo(()=>{
    const s = {הכל:items.length};
    UNIT_LIST.forEach(u=> s[u] = items.filter(([,i])=>i.unit===u).length);
    return s;
  },[items]);

  const soldierCount = items.filter(([,i])=>i.assignedType==="soldier").length;
  const unitCount = items.filter(([,i])=>i.assignedType==="unit").length;

  function transferItem(id, newUnit){
    const ndb={...db,unitItems:{...db.unitItems,[id]:{...db.unitItems[id],unit:newUnit,movedAt:new Date().toLocaleDateString("he-IL")}}};
    saveDB(ndb); setDb(ndb); setShowTransfer(null);
  }

  function assignToSoldier(id, soldierId){
    const item = db.unitItems[id];
    if(!item||!soldierId||item.assignedType==="soldier") return;
    const soldier = soldiers.find(s=>s.id===soldierId);
    if(!soldier) return;
    const assigned = db.assignments?.[soldierId]!==undefined ? db.assignments[soldierId] : soldier.assigned||{};
    const newAssigned = {...assigned, [item.name]: item.serial||1};
    const newUnitItems={...db.unitItems};
    newUnitItems[id] = {...item, assignedType:"soldier", assignedSoldierId:soldierId};
    const newDb={...db,
      assignments:{...(db.assignments||{}),[soldierId]:newAssigned},
      signatures:{...(db.signatures||{})},
      unitItems:newUnitItems
    };
    delete newDb.signatures[soldierId];
    saveDB(newDb); setDb(newDb); setShowAssign(null);
  }

  function deleteItem(id){
    if(!window.confirm("למחוק פריט זה?")) return;
    const newItems={...db.unitItems}; delete newItems[id];
    const ndb={...db,unitItems:newItems}; saveDB(ndb); setDb(ndb);
  }

  function downloadReport(){
    const BOM = "\uFEFF";
    const header = "פלוגה,שם אמצעי,מספר סידורי,סוג שיוך,הערה\n";
    const rows = filtered.map(([,item])=>{
      const type = item.assignedType==="soldier"?"משויך לחייל":"מוקצה לפלוגה";
      return `"${item.unit}","${item.name}","${item.serial||"—"}","${type}","${item.broken?"תקול":""}${item.note||""}"`;
    }).join("\n");
    const blob = new Blob([BOM+header+rows],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`מלאי_${filterUnit==="הכל"?"כולם":filterUnit}_${new Date().toLocaleDateString("he-IL").replace(/\//g,"-")}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }

  // Group filtered by unit for display
  const groupedByUnit = React.useMemo(()=>{
    const groups = {};
    filtered.forEach(([id,item])=>{
      if(!groups[item.unit]) groups[item.unit] = [];
      groups[item.unit].push([id,item]);
    });
    return groups;
  },[filtered]);

  const unitOrder = ["א","ב","ג","מסייעת","אגמ","פלסמ","גדודי","נעורה","חטיבה 6","פנוי"];
  const sortedUnits = Object.keys(groupedByUnit).sort((a,b)=>unitOrder.indexOf(a)-unitOrder.indexOf(b));

  return (
    <div style={{maxWidth:860,margin:"0 auto",padding:16}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:17,fontWeight:800,margin:0}}>📦 מלאי — {filtered.length} פריטים</h2>
        <div style={{display:"flex",gap:8}}>
          <button onClick={downloadReport} style={{...S.btn("purple"),padding:"7px 12px",fontSize:12}}>⬇️ Excel</button>

          <button onClick={()=>setShowAdd(!showAdd)} style={{...S.btn("green"),padding:"7px 12px",fontSize:12}}>
            {showAdd?"✕ ביטול":"➕ הוסף"}
          </button>
        </div>
      </div>

      {/* טופס הוספה */}
      {showAdd&&<AddUnitItemForm db={db} setDb={setDb} onDone={()=>setShowAdd(false)}/>}

      {/* סינון לפי פלוגה */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"#8b949e",marginBottom:5}}>סינון לפי פלוגה:</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {["הכל",...UNIT_LIST].map(u=>{
            const count = u==="הכל"?items.length:(stats[u]||0);
            const color = UNIT_COLORS[u]||"#388bfd";
            return (
              <button key={u} onClick={()=>setFilterUnit(u)}
                style={{padding:"4px 10px",borderRadius:7,border:`1px solid ${filterUnit===u?color:"#30363d"}`,
                  background:filterUnit===u?color+"22":"#0d1117",color:filterUnit===u?color:"#8b949e",
                  cursor:"pointer",fontSize:12,fontWeight:filterUnit===u?700:400}}>
                {u==="הכל"?"כולם":u==="פנוי"?"פנוי":u} ({count})
              </button>
            );
          })}
        </div>
      </div>

      {/* סינון לפי סוג שיוך */}
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#8b949e"}}>סוג:</span>
        {[["הכל","הכל",items.length],["soldier","🔵 משויך לחייל",soldierCount],["unit","🟡 מוקצה לפלוגה",unitCount]].map(([val,label,cnt])=>(
          <button key={val} onClick={()=>setFilterType(val)}
            style={{padding:"3px 9px",borderRadius:6,border:`1px solid ${filterType===val?"#388bfd":"#30363d"}`,
              background:filterType===val?"#1f3a5f":"#0d1117",color:filterType===val?"#e6edf3":"#8b949e",
              cursor:"pointer",fontSize:12}}>
            {label} ({cnt})
          </button>
        ))}
      </div>

      {/* חיפוש */}
      <input value={filterName} onChange={e=>setFilterName(e.target.value)}
        placeholder="🔍 חפש שם אמצעי או מספר סידורי..."
        style={{...S.input,marginBottom:14}}/>

      {/* רשימה מקובצת לפי פלוגה */}
      {sortedUnits.map(unit=>{
        const unitItems2 = groupedByUnit[unit];
        const color = UNIT_COLORS[unit]||"#388bfd";
        const unitLabel = unit==="גדודי"?"🎖️ גדודי":unit==="נעורה"?"📦 נעורה":unit==="פנוי"?"🟢 פנוי":unit==="חטיבה 6"?"🔺 חטיבה 6":"פלוגה "+unit;
        const allSolsList=[...Object.values(db.customSoldiers||{}),...soldiers];

        // Group by item name
        const byName = {};
        unitItems2.forEach(([id,item])=>{
          if(!byName[item.name]) byName[item.name]={total:0,soldiers:0,unitQty:0,broken:0,entries:[]};
          byName[item.name].total++;
          if(item.assignedType==="soldier") byName[item.name].soldiers++;
          else byName[item.name].unitQty++;
          if(item.broken) byName[item.name].broken++;
          byName[item.name].entries.push([id,item]);
        });
        const sortedByName = Object.entries(byName).sort((a,b)=>b[1].total-a[1].total);

        return (
          <div key={unit} style={{marginBottom:22}}>
            {/* כותרת פלוגה */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${color}`}}>
              <div style={{width:14,height:14,borderRadius:2,background:color,flexShrink:0}}/>
              <span style={{fontWeight:800,fontSize:15,color}}>{unitLabel}</span>
              <span style={{fontSize:12,color:"#484f58"}}>({unitItems2.length} פריטים)</span>
              <span style={{fontSize:11,color:"#8b949e",marginRight:"auto"}}>
                🔵 {unitItems2.filter(([,i])=>i.assignedType==="soldier").length} לחייל &nbsp;
                🟡 {unitItems2.filter(([,i])=>i.assignedType==="unit").length} לפלוגה
              </span>
            </div>

            {/* קוביות סיכום לפי פריט */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,marginBottom:10}}>
              {sortedByName.map(([name,info])=>{
                const isExp = expandedItem2===unit+"_"+name;
                const borderColor = info.soldiers>0&&info.unitQty===0?"#388bfd":info.unitQty>0&&info.soldiers===0?"#e3b341":"#a371f7";
                return (
                  <div key={name} onClick={()=>setExpandedItem2(isExp?null:unit+"_"+name)}
                    style={{background:isExp?"#1a1f2e":"#0d1117",borderRadius:9,padding:"10px 12px",cursor:"pointer",
                      border:`1px solid ${isExp?color:"#21262d"}`,
                      borderTop:`3px solid ${borderColor}`,transition:"border .15s"}}>
                    <div style={{fontWeight:800,fontSize:24,color,lineHeight:1}}>{info.total}</div>
                    <div style={{fontWeight:600,fontSize:12,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#58a6ff",
                      marginTop:4,marginBottom:4,lineHeight:1.2}}>{name}</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {info.soldiers>0&&<span style={{fontSize:10,color:"#388bfd"}}>🔵{info.soldiers}</span>}
                      {info.unitQty>0&&<span style={{fontSize:10,color:"#e3b341"}}>🟡{info.unitQty}</span>}
                      {info.broken>0&&<span style={{fontSize:10,color:"#f85149"}}>⚠️{info.broken}</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* פירוט מורחב */}
            {sortedByName.map(([name,info])=>{
              if(expandedItem2!==unit+"_"+name) return null;
              return (
                <div key={"exp_"+name} style={{background:"#161b22",borderRadius:9,padding:"12px 14px",
                  marginBottom:10,border:`1px solid ${color}`}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:8,color}}>
                    {name} — {info.total} יחידות
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {info.entries.map(([id,item])=>{
                      const isSoldier = item.assignedType==="soldier";
                      // שם חייל — מהנתונים המוטמעים או מה-assignments
                      let sol = null;
                      let soldierDisplayName = null;
                      if(isSoldier){
                        // Use embedded soldier name first
                        if(item.assignedSoldierName){
                          soldierDisplayName = item.assignedSoldierName;
                        } else if(item.assignedSoldierId){
                          sol = allSolsList.find(s=>s.id===item.assignedSoldierId);
                          soldierDisplayName = sol?.name;
                        }
                        // Fallback: search by serial in assignments
                        if(!soldierDisplayName && item.serial){
                          sol = allSolsList.find(s=>{
                            const asgn = db.assignments?.[s.id]!==undefined ? db.assignments[s.id] : s.assigned||{};
                            return Object.values(asgn).some(v=>String(v)===String(item.serial));
                          });
                          soldierDisplayName = sol?.name;
                        }
                      }
                      return (
                        <div key={id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
                          background:"#0d1117",borderRadius:6,
                          borderRight:`3px solid ${isSoldier?"#388bfd":"#e3b341"}`}}>
                          <div style={{width:9,height:9,borderRadius:2,flexShrink:0,
                            background:isSoldier?"#388bfd":"#e3b341"}}/>
                          <span style={{flex:1,fontSize:12,color:"#e6edf3"}}>
                            {isSoldier?(soldierDisplayName||"לא ידוע"):"מוקצה לפלוגה"}
                          </span>
                          {item.serial&&<span style={{color:"#8b949e",fontFamily:"monospace",fontSize:11}}>{item.serial}</span>}
                          {item.broken&&<span style={{color:"#f85149",fontSize:10}}>⚠️ תקול</span>}
                          {auth.role!=="viewer"&&<div style={{display:"flex",gap:3}}>
                            {!isSoldier&&<>
                              <button onClick={e=>{e.stopPropagation();setShowTransfer(showTransfer===id?null:id);setShowAssign(null);}}
                                style={{...S.btn("orange"),padding:"2px 6px",fontSize:10}}>🔄</button>
                              <button onClick={e=>{e.stopPropagation();setShowAssign(showAssign===id?null:id);setShowTransfer(null);}}
                                style={{...S.btn("blue"),padding:"2px 6px",fontSize:10}}>👤</button>
                            </>}
                            <button onClick={e=>{e.stopPropagation();deleteItem(id);}}
                              style={{...S.btn("red"),padding:"2px 6px",fontSize:10}}>✕</button>
                          </div>}
                        </div>
                      );
                    })}
                  </div>
                  {showTransfer&&info.entries.some(([id])=>id===showTransfer)&&(
                    <div style={{marginTop:8,padding:8,background:"#0d1117",borderRadius:6}}>
                      <div style={{fontSize:11,color:"#8b949e",marginBottom:6}}>העבר ל:</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {UNIT_LIST.map(u=>(
                          <button key={u} onClick={()=>transferItem(showTransfer,u)}
                            style={{...S.btn(unit===u?"green":""),padding:"3px 8px",fontSize:11}}>
                            {u==="פנוי"?"פנוי":u==="גדודי"?"גדודי":u}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  {showAssign&&info.entries.some(([id])=>id===showAssign)&&(
                    <AssignToSoldierPanel
                      item={info.entries.find(([id])=>id===showAssign)?.[1]||{}}
                      itemId={showAssign} soldiers={soldiers} db={db}
                      onAssign={(solId)=>assignToSoldier(showAssign,solId)}
                      onClose={()=>setShowAssign(null)}/>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

            {filtered.length===0&&(
        <div style={{textAlign:"center",padding:40,color:"#484f58"}}>
          <div style={{fontSize:40,marginBottom:8}}>📦</div>
          <div>אין פריטים לפי הסינון הנוכחי</div>
        </div>
      )}
    </div>
  );
}

// =================== DASH DETAIL MODAL ===================
function DashDetailModal({type, soldiers, db, onClose}){
  const [unitFilter, setUnitFilter] = React.useState("הכל");
  const units = ["הכל",...[...new Set(soldiers.map(s=>s.unit))].sort()];

  const filtered = React.useMemo(()=>{
    let list = soldiers;
    if(type==="signed") list=list.filter(s=>!!db.signatures?.[s.id]);
    else if(type==="unsigned") list=list.filter(s=>{
      const hasWeapon=Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k));
      return hasWeapon && !db.signatures?.[s.id];
    });
    else if(type==="withWeapon") list=list.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k)));
    if(unitFilter!=="הכל") list=list.filter(s=>s.unit===unitFilter);
    return list;
  },[type, soldiers, db, unitFilter]);

  const TITLES = {signed:"✅ חיילים חתומים", unsigned:"⏳ טרם חתמו", withWeapon:"🔫 חיילים עם נשק", all:"🪖 כל החיילים"};

  return (
    <Modal title={TITLES[type]||"פירוט"} onClose={onClose}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {units.map(u=>(
          <button key={u} onClick={()=>setUnitFilter(u)}
            style={{...S.btn(unitFilter===u?"blue":""),padding:"4px 10px",fontSize:12}}>
            {u==="הכל"?"כולם":"פלוגה "+u}
          </button>
        ))}
      </div>
      <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>{filtered.length} חיילים</div>
      <div style={{maxHeight:420,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(s=>{
          const hasSig=!!db.signatures?.[s.id];
          const items=Object.entries(s.assigned||{});
          return (
            <div key={s.id} style={{background:"#0d1117",borderRadius:8,padding:"9px 12px",border:"1px solid #21262d"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontWeight:700,fontSize:13}}>{s.name}</div>
                <div style={{display:"flex",gap:5}}>
                  <Badge color={hasSig?"green":"orange"} small>{hasSig?"✅":"⏳"}</Badge>
                  <Badge color="purple" small>{s.unit}</Badge>
                </div>
              </div>
              <div style={{fontSize:11,color:"#484f58",marginBottom:items.length?4:0}}>מ.א: {s.id}</div>
              {items.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {items.map(([name,val])=>(
                    <span key={name} style={{background:"#161b22",borderRadius:4,padding:"2px 6px",fontSize:10,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>
                      {name}{isSerial(val)?" · "+val:""}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",padding:20,color:"#484f58"}}>אין חיילים בקטגוריה זו</div>}
      </div>
    </Modal>
  );
}

// =================== SEARCH MODAL (חיפוש צ / סידורי) ===================
function SearchModal({onClose, soldiers, db}){
  const [q, setQ] = React.useState("");
  const allSols = React.useMemo(()=>[...Object.values(db.customSoldiers||{}),...soldiers],[db,soldiers]);

  const results = React.useMemo(()=>{
    const t = q.trim();
    if(!t) return [];
    const isNum = /^\d+$/.test(t);
    if(isNum){
      // חיפוש לפי מספר אישי
      const byId = allSols.filter(s=>String(s.id).includes(t));
      // חיפוש לפי סידורי — אצל חיילים
      const bySerial = [];
      allSols.forEach(s=>{
        const assigned = db.assignments?.[s.id]!==undefined ? db.assignments[s.id] : s.assigned||{};
        Object.entries(assigned).forEach(([name,val])=>{
          if(val && String(val).includes(t) && isSerial(val)){
            bySerial.push({soldier:s, itemName:name, serial:val, source:"soldier"});
          }
        });
      });
      // חיפוש סידורי במלאי גדודי
      Object.values(db.unitItems||{}).forEach(item=>{
        if(item.serial && String(item.serial).includes(t)){
          bySerial.push({itemName:item.name, serial:item.serial, unit:item.unit, source:"inventory"});
        }
      });
      // חיפוש בכל ALL_SERIALS (כולל מה שלא מוקצה)
      ALL_SERIALS.forEach(s=>{
        const serialStr = String(s.serial);
        if(serialStr.includes(t) && !bySerial.some(r=>String(r.serial)===serialStr)){
          bySerial.push({itemName:s.name, serial:s.serial, unit:s.unit||"?", assignedToSoldier:s.assignedToSoldier, source:"registry"});
        }
      });
      return {byId, bySerial};
    } else {
      // חיפוש לפי שם
      const byName = allSols.filter(s=>s.name&&s.name.includes(t));
      return {byId:byName, bySerial:[]};
    }
  },[q, allSols, db]);

  const inp = React.useRef(null);
  React.useEffect(()=>{ setTimeout(()=>inp.current?.focus(),100); },[]);

  return (
    <Modal title="🔍 חיפוש צ׳ / מספר סידורי" onClose={onClose}>
      <input ref={inp} value={q} onChange={e=>setQ(e.target.value)}
        placeholder="הקלד מספר אישי, מספר סידורי, או שם..."
        style={{...S.input,width:"100%",fontSize:15,marginBottom:16}}/>
      {q.trim()&&(
        <div>
          {results.byId?.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#8b949e",marginBottom:6}}>👤 חיילים ({results.byId.length})</div>
              {results.byId.map(s=>{
                const assigned = db.assignments?.[s.id]!==undefined ? db.assignments[s.id] : s.assigned||{};
                const items = Object.entries(assigned);
                const hasSig = !!db.signatures?.[s.id];
                return (
                  <div key={s.id} style={{background:"#0d1117",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #21262d"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <Badge color={hasSig?"green":"orange"} small>{hasSig?"✅ חתום":"⏳ לא חתום"}</Badge>
                        <Badge color="purple" small>פלוגה {s.unit}</Badge>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"#484f58",marginBottom:6}}>מ.א: {s.id}</div>
                    {items.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {items.map(([name,val])=>(
                          <span key={name} style={{background:"#161b22",borderRadius:4,padding:"2px 7px",fontSize:11,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>
                            {name}{isSerial(val)?" · "+val:""}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {results.bySerial?.length>0&&(
            <div>
              <div style={{fontSize:12,color:"#8b949e",marginBottom:6}}>🔢 מספרים סידוריים ({results.bySerial.length})</div>
              {results.bySerial.map((r,i)=>(
                <div key={i} style={{background:"#0d1117",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #21262d"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    <div>
                      <span style={{fontWeight:700,fontSize:14,color:WEAPON_KEYS.includes(r.itemName)?"#e6edf3":"#388bfd"}}>{r.itemName}</span>
                      <span style={{color:"#8b949e",fontFamily:"monospace",fontSize:12,marginRight:8}}>· {r.serial}</span>
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      {r.source==="soldier"&&<Badge color="blue" small>👤 {r.soldier?.name}</Badge>}
                      {r.source==="inventory"&&<Badge color="green" small>📦 מלאי</Badge>}
                      {r.source==="registry"&&<Badge color={r.assignedToSoldier?"blue":"orange"} small>{r.assignedToSoldier?"✅ מוקצה לחייל":"📋 רישום גדודי"}</Badge>}
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#484f58",marginTop:4}}>
                    {r.source==="soldier"&&`פלוגה ${r.soldier?.unit} · מ.א ${r.soldier?.id}`}
                    {r.source!=="soldier"&&`פלוגה ${r.unit||"—"}`}
                    {r.broken&&" · ⚠️ תקול"}
                  </div>
                </div>
              ))}
            </div>
          )}
          {results.byId?.length===0&&results.bySerial?.length===0&&(
            <div style={{textAlign:"center",padding:24,color:"#484f58"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔍</div>
              <div>לא נמצאו תוצאות עבור "{q}"</div>
            </div>
          )}
        </div>
      )}
      {!q.trim()&&(
        <div style={{textAlign:"center",padding:24,color:"#484f58"}}>
          <div style={{fontSize:32,marginBottom:8}}>🔍</div>
          <div style={{fontSize:13}}>חפש לפי מספר אישי, מספר סידורי, או שם חייל</div>
        </div>
      )}
    </Modal>
  );
}

// =================== PERMISSIONS TAB ===================
const PERM_LABELS = {
  canCheckout:"שיוך אמצעים", canReturn:"ביטול שיוך", canSign:"שליחת לינק חתימה",
  canBulkSign:"החתמה מרוכזת", canEdit:"עריכת נתונים", canDownload:"הורדת טפסים",
};
function PermissionsTab({db, setDb}){
  // משתמשים קבועים + דינמיים מ-Firebase
  const staticUsers = Object.entries(USERS).filter(([,u])=>u.role==="manager"||u.role==="admin");
  const dynamicUsers = Object.entries(db.dynamicUsers||{});
  const allUsers = [...staticUsers, ...dynamicUsers.map(([k,u])=>[k,{...u,dynamic:true}])];

  const [showAdd, setShowAdd] = useState(false);
  const [newUser, setNewUser] = useState({username:"",name:"",pass:"",role:"viewer",viewUnit:"הכל"});
  const [err, setErr] = useState("");

  function togglePerm(username, perm, isDynamic){
    const baseRole = isDynamic ? (db.dynamicUsers?.[username]?.role||"viewer") : (USERS[username]?.role||"viewer");
    const base = DEFAULT_PERMS[baseRole]||{};
    const current = db.userPerms?.[username] || {};
    const merged = {...base,...current};
    const newVal = !merged[perm];
    const newPerms = {...(db.userPerms||{}), [username]: {...current, [perm]: newVal}};
    const ndb = {...db, userPerms: newPerms};
    saveDB(ndb); setDb(ndb);
  }

  function addUser(){
    setErr("");
    if(!newUser.username.trim()||!newUser.name.trim()||!newUser.pass.trim()){setErr("יש למלא את כל השדות");return;}
    if(USERS[newUser.username]||db.dynamicUsers?.[newUser.username]){setErr("שם משתמש כבר קיים");return;}
    const u = {name:newUser.name,pass:newUser.pass,role:newUser.role,soldierId:"",viewUnit:newUser.viewUnit,dynamic:true};
    const ndb = {...db, dynamicUsers:{...(db.dynamicUsers||{}),[newUser.username.trim()]:u}};
    saveDB(ndb); setDb(ndb);
    setNewUser({username:"",name:"",pass:"",role:"viewer",viewUnit:"הכל"});
    setShowAdd(false);
  }

  function deleteUser(username){
    if(!window.confirm("למחוק משתמש "+username+"?")) return;
    const newDyn={...db.dynamicUsers}; delete newDyn[username];
    const newPerms={...db.userPerms}; delete newPerms[username];
    const ndb={...db,dynamicUsers:newDyn,userPerms:newPerms};
    saveDB(ndb); setDb(ndb);
  }

  const ROLE_LABELS = {admin:"מנהל ראשי",manager:"מנהל",viewer:"צפייה בלבד"};
  const UNIT_OPTS = ["הכל","א","ב","ג","מסייעת","אגמ","פלסמ"];

  return (
    <div style={{padding:16,maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:16,color:"#c084fc",margin:0}}>🔑 ניהול משתמשים והרשאות</h2>
        <button onClick={()=>setShowAdd(!showAdd)} style={{...S.btn("green"),padding:"7px 14px",fontSize:13}}>
          {showAdd?"✕ ביטול":"＋ הוסף משתמש"}
        </button>
      </div>

      {showAdd&&(
        <div style={{background:"#161b22",border:"1px solid #238636",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#3fb950"}}>➕ הוספת משתמש חדש</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <label style={S.label}>שם משתמש (לכניסה)</label>
              <input value={newUser.username} onChange={e=>setNewUser({...newUser,username:e.target.value})} placeholder="לדוגמא: dani" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>שם מלא</label>
              <input value={newUser.name} onChange={e=>setNewUser({...newUser,name:e.target.value})} placeholder="דני כהן" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>סיסמה</label>
              <input value={newUser.pass} onChange={e=>setNewUser({...newUser,pass:e.target.value})} placeholder="סיסמה" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>תפקיד</label>
              <select value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value})} style={S.input}>
                <option value="viewer">צפייה בלבד</option>
                <option value="manager">מנהל</option>
              </select>
            </div>
            {newUser.role==="viewer"&&(
              <div>
                <label style={S.label}>גישה לפלוגה</label>
                <select value={newUser.viewUnit} onChange={e=>setNewUser({...newUser,viewUnit:e.target.value})} style={S.input}>
                  {UNIT_OPTS.map(u=><option key={u} value={u}>{u==="הכל"?"כל הגדוד":"פלוגה "+u}</option>)}
                </select>
              </div>
            )}
          </div>
          {err&&<div style={{color:"#f85149",fontSize:12,marginBottom:8}}>{err}</div>}
          <button onClick={addUser} style={{...S.btn("green"),width:"100%",padding:"10px 0"}}>שמור משתמש</button>
        </div>
      )}

      {allUsers.map(([username, u])=>{
        const isDynamic = !!u.dynamic;
        const baseRole = u.role||"viewer";
        const base = DEFAULT_PERMS[baseRole]||{};
        const custom = db.userPerms?.[username]||{};
        const merged = {...base,...custom};
        const isAdmin = baseRole==="admin";
        return (
          <div key={username} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:isAdmin?"#2d1f4e":isDynamic?"#1a2a1a":"#1f3a5f",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                {isAdmin?"👑":baseRole==="viewer"?"👁️":"🪖"}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
                <div style={{fontSize:11,color:"#8b949e"}}>{ROLE_LABELS[baseRole]||baseRole} • {username} {isDynamic&&<span style={{color:"#3fb950",fontSize:10}}>● דינמי</span>}</div>
              </div>
              {isDynamic&&(
                <button onClick={()=>deleteUser(username)} style={{...S.btn("red"),padding:"4px 8px",fontSize:11}}>מחק</button>
              )}
            </div>
            {!isAdmin&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {Object.entries(PERM_LABELS).map(([perm,label])=>{
                  const enabled = merged[perm];
                  return (
                    <div key={perm} onClick={()=>togglePerm(username,perm,isDynamic)}
                      style={{display:"flex",alignItems:"center",gap:8,background:"#0d1117",borderRadius:7,padding:"7px 10px",cursor:"pointer",border:`1px solid ${enabled?"#238636":"#30363d"}`}}>
                      <div style={{width:16,height:16,borderRadius:3,background:enabled?"#238636":"#21262d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0,color:"#fff"}}>
                        {enabled?"✓":""}
                      </div>
                      <span style={{fontSize:12,color:enabled?"#3fb950":"#8b949e"}}>{label}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {isAdmin&&<div style={{fontSize:11,color:"#8b949e",textAlign:"center"}}>מנהל ראשי — הרשאות מלאות תמיד</div>}
          </div>
        );
      })}
    </div>
  );
}

// =================== BULK SIGN MODAL (פיצר 2 - דיטור) ===================
function BulkSignModal({db, onSave, onClose, soldiers, auth}){
  const [repSearch,setRepSearch]=React.useState("");
  const [repId,setRepId]=React.useState("");
  const [selectedUnit,setSelectedUnit]=React.useState("הכל");
  const [repSuggestions,setRepSuggestions]=React.useState([]);
  const [sigData,setSigData]=React.useState(null);
  const [showPad,setShowPad]=React.useState(false);
  const [step,setStep]=React.useState("select"); // select, sign, done

  const units=["הכל",...[...new Set(soldiers.map(s=>s.unit))].sort()];
  const targetSoldiers=React.useMemo(()=>{
    let l=soldiers.filter(s=>{
      const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
      return weps.length>0 && !db.signatures?.[s.id];
    });
    if(selectedUnit!=="הכל") l=l.filter(s=>s.unit===selectedUnit);
    return l;
  },[soldiers,db.signatures,selectedUnit]);

  function onRepSearch(v){
    setRepSearch(v);setRepId("");
    if(!v.trim()){setRepSuggestions([]);return;}
    const q=v.toLowerCase();
    setRepSuggestions(soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6));
  }

  function doSign(sig){
    setSigData(sig);setShowPad(false);setStep("done");
    const signedAt=todayStr()+" "+nowStr();
    const guarantorKey=repId||("bulk_"+Date.now());
    // המר מערכים לאובייקטים (Firebase לא אוהב מערכים)
    const soldiersObj={}; targetSoldiers.forEach(s=>{soldiersObj[s.id]=true;});
    const remainingObj={}; targetSoldiers.forEach(s=>{remainingObj[s.id]=true;});
    const newGuarantors={...(db.bulkGuarantors||{})};
    newGuarantors[guarantorKey]={
      repId,repName:repSearch,sigData:sig,signedAt,
      unit:selectedUnit,
      soldiers:soldiersObj,
      remaining:remainingObj,
    };
    const ndb={...db,bulkGuarantors:newGuarantors};
    onSave(ndb);
  }

  return (
    <Modal title="✍️ החתמה מרוכזת" onClose={onClose} wide>
      {step==="select"&&(
        <div>
          <div style={{background:"#1a2a1a",border:"1px solid #238636",borderRadius:8,padding:12,marginBottom:16,fontSize:13,color:"#3fb950"}}>
            🪖 פיצר זה מאפשר לאדם אחד (כגון אביאל דיטור) לחתום על כל ציוד הפלוגה בחתימה אחת
          </div>

          <label style={S.label}>בחר פלוגה להחתים</label>
          <select value={selectedUnit} onChange={e=>setSelectedUnit(e.target.value)} style={{...S.input}}>
            {units.map(u=><option key={u} value={u}>{u==="הכל"?"כל הפלוגות":"פלוגה "+u}</option>)}
          </select>

          <label style={S.label}>שם החותם (נציג / אחראי)</label>
          <div style={{position:"relative"}}>
            <input value={repSearch} onChange={e=>onRepSearch(e.target.value)} placeholder="הקלד שם..." style={S.input}/>
            {repSuggestions.length>0&&(
              <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#161b22",border:"1px solid #30363d",borderRadius:8,zIndex:100}}>
                {repSuggestions.map(s=>(
                  <div key={s.id} onClick={()=>{setRepSearch(s.name);setRepId(s.id);setRepSuggestions([]);}}
                    style={{padding:"8px 12px",cursor:"pointer",color:"#e6edf3",fontSize:13}}>
                    {s.name} <span style={{color:"#8b949e",fontSize:11}}>({s.id})</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{background:"#0d1117",borderRadius:8,padding:12,marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>⚠️ חיילים שיחתמו ({targetSoldiers.length})</div>
            {targetSoldiers.length===0
              ?<div style={{color:"#8b949e",fontSize:13}}>אין חיילים ממתינים בפלוגה זו</div>
              :<div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                {targetSoldiers.map(s=>(
                  <div key={s.id} style={{fontSize:12,color:"#e6edf3",display:"flex",justifyContent:"space-between"}}>
                    <span>{s.name}</span>
                    <span style={{color:"#8b949e"}}>{Object.keys(s.assigned).filter(k=>WEAPON_KEYS.includes(k)).join(", ")}</span>
                  </div>
                ))}
              </div>
            }
          </div>

          <button onClick={()=>setStep("sign")} disabled={targetSoldiers.length===0||!repSearch.trim()}
            style={{...S.btn("green"),width:"100%",padding:"12px 0",fontSize:15,opacity:targetSoldiers.length===0||!repSearch.trim()?0.5:1}}>
            → המשך לחתימה ({targetSoldiers.length} חיילים)
          </button>
        </div>
      )}
      {step==="sign"&&(
        <div>
          <div style={{...S.card,marginBottom:16,background:"#0d1117"}}>
            <div style={{fontWeight:700,marginBottom:4}}>נציג: {repSearch}</div>
            <div style={{color:"#8b949e",fontSize:13}}>חותם על {targetSoldiers.length} חיילים מ{selectedUnit==="הכל"?"כל הפלוגות":"פלוגה "+selectedUnit}</div>
          </div>
          {!sigData
            ?<div>
              <p style={{color:"#8b949e",fontSize:13,marginBottom:12}}>חתום כאן לאישור קבלת כל האמצעים ברשימה</p>
              <SignaturePad onSave={doSign}/>
              <button onClick={()=>setStep("select")} style={{...S.btn(),width:"100%",marginTop:8}}>← חזור</button>
            </div>
            :<div style={{textAlign:"center"}}><div style={{fontSize:48}}>✅</div><div style={{color:"#3fb950",fontWeight:700}}>נחתם!</div></div>
          }
        </div>
      )}
      {step==="done"&&(
        <div style={{textAlign:"center",padding:24}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h2 style={{color:"#3fb950",marginBottom:8}}>החתימה המרוכזת התקבלה!</h2>
          <p style={{color:"#8b949e",fontSize:13,marginBottom:20}}>{targetSoldiers.length} חיילים סומנו כחתומים בשם {repSearch}</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>downloadBulkForm(repSearch,repId,selectedUnit,targetSoldiers,sigData,db)} style={{...S.btn("purple"),padding:"10px 20px",fontSize:14}}>⬇️ הורד שובר מרוכז</button>
            <button onClick={onClose} style={{...S.btn("green"),padding:"10px 20px",fontSize:14}}>סגור</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

function App(){
  const [auth,setAuth]=useState(()=>{
    // בדוק אם יש פרמטר ?sign= בURL
    const params=new URLSearchParams(window.location.search);
    const signId=params.get("sign");
    if(signId){
      const s=RAW_SOLDIERS.find(x=>x.id===signId);
      let assignedFromLink={};
      const bParam=params.get("b");
      const dParam=params.get("d");
      const rawParam=bParam||dParam;
      if(rawParam){try{
        const decoded=bParam?atob(bParam):decodeURIComponent(rawParam);
        const compact=JSON.parse(decoded);
        Object.entries(compact).forEach(([k,v])=>{
          const idx=parseInt(k);
          if(!isNaN(idx)&&EQ_COLS[idx]) assignedFromLink[EQ_COLS[idx]]=v;
          else assignedFromLink[k]=v;
        });
      }catch(e){}}
      if(s) return{role:"soldier",name:s.name,soldierId:signId,autoSign:true,assignedFromLink};
      return{role:"soldier",name:"חייל",soldierId:signId,autoSign:true,assignedFromLink};
    }
    // שחזר session שמור
    try{
      const saved=sessionStorage.getItem("armory_session");
      if(saved) return JSON.parse(saved);
    }catch(e){}
    return null;
  });

  function handleLogin(a){
    try{sessionStorage.setItem("armory_session",JSON.stringify(a));}catch(e){}
    setAuth(a);
  }
  function handleLogout(){
    try{sessionStorage.removeItem("armory_session");}catch(e){}
    setAuth(null);
  }

  const [db,setDb]=useState(()=>initDB());
  if(!auth)return<Login onLogin={handleLogin}/>;
  if(auth.role==="soldier")return<SoldierSignView auth={auth} onLogout={handleLogout} db={db} setDb={setDb}/>;
  return<ManagerApp auth={auth} onLogout={handleLogout} db={db} setDb={setDb}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
