function loadDB(){try{const r=localStorage.getItem(DB_KEY);if(!r)return null;const d=JSON.parse(r);if(d.signatures)d.signatures=cleanSigs(d.signatures);if(!d.unitItems||Object.keys(d.unitItems).length===0) d.unitItems={...IMPORTED_UNIT_ITEMS};return d;}catch(e){return null;}}
// נקה assigned מתוך signatures (Firebase לא אוהב מפתחות עם נקודות)
function cleanSigs(sigs){
  if(!sigs) return {};
  const out={};
  Object.entries(sigs).forEach(([id,sig])=>{
    const {assigned:_,...rest}=sig||{};
    out[id]=rest;
  });
  return out;
}
function saveDB(db){
  const safe={assignments:{},signatures:{},customSoldiers:{},brokenItems:[],bulkGuarantors:{},userPerms:{},dynamicUsers:{},unitItems:{},...db};
  try{localStorage.setItem(DB_KEY,JSON.stringify(safe));}catch(e){}
  fbSet("db/assignments", safe.assignments).catch(e=>console.warn("FB err:",e));
  fbSet("db/signatures", cleanSigs(safe.signatures)).catch(e=>console.warn("FB err:",e));
  fbSet("db/customSoldiers", safe.customSoldiers).catch(e=>console.warn("FB err:",e));
  fbSet("db/brokenItems", safe.brokenItems).catch(e=>console.warn("FB err:",e));
  fbSet("db/bulkGuarantors", safe.bulkGuarantors).catch(e=>console.warn("FB err:",e));
  fbSet("db/userPerms", safe.userPerms).catch(e=>console.warn("FB err:",e));
  fbSet("db/dynamicUsers", safe.dynamicUsers).catch(e=>console.warn("FB err:",e));
  fbSet("db/unitItems", safe.unitItems).catch(e=>console.warn("FB err:",e));
}
function initDB(){
  const local=loadDB();
  const empty={assignments:{},signatures:{},customSoldiers:{},bulkGuarantors:{},unitItems:{...IMPORTED_UNIT_ITEMS}};
  if(local){
    // סנכרן את ה-localStorage ל-Firebase בהתחלה
    fbSet("db/assignments", local.assignments||{}).catch(()=>{});
    fbSet("db/signatures", local.signatures||{}).catch(()=>{});
    fbSet("db/customSoldiers", local.customSoldiers||{}).catch(()=>{});
    return local;
  }
  return empty;
}

function Badge({color="gray",children,small=false}){
  const cols={green:{bg:"#1a4731",t:"#3fb950",b:"#238636"},red:{bg:"#3d1a1a",t:"#f85149",b:"#6e2020"},orange:{bg:"#3d2a1a",t:"#e3b341",b:"#6e3b1a"},blue:{bg:"#1a2f4a",t:"#388bfd",b:"#1f3a5f"},gray:{bg:"#21262d",t:"#8b949e",b:"#30363d"},wa:{bg:"#0d2318",t:"#25d366",b:"#128c7e"},purple:{bg:"#2d1f4a",t:"#c084fc",b:"#4a2d8a"}};
  const c=cols[color]||cols.gray;
  return <span style={{background:c.bg,color:c.t,border:`1px solid ${c.b}`,borderRadius:20,padding:small?"2px 8px":"3px 11px",fontSize:small?11:12,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
}

function Modal({title,onClose,children,wide=false}){
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:16,width:"100%",maxWidth:wide?700:480,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,.8)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"15px 20px",borderBottom:"1px solid #21262d",position:"sticky",top:0,background:"#161b22",zIndex:1}}>
          <h3 style={{color:"#e6edf3",margin:0,fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#8b949e",cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:20}}>{children}</div>
      </div>
    </div>
  );
}


function SerialPicker({itemName, value, onChange, db}){
  const [query, setQuery] = useState(value||"");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  // כל הסידוריים המשויכים כרגע לחיילים (DB גובר על RAW)
  const usedSerials = useMemo(()=>{
    const used = new Set();
    // קודם כל RAW_SOLDIERS
    RAW_SOLDIERS.forEach(s=>{
      // אם יש override ב-DB נתעלם מה-RAW
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    // חיילים מותאמים אישית
    Object.values(db.customSoldiers||{}).forEach(s=>{
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    // פריטי מלאי גדודי
    Object.values(db.unitItems||{}).forEach(item=>{ if(item.serial&&String(item.serial).length>3) used.add(Number(item.serial)); });
    return used;
  },[db]);

  // סידוריים זמינים לאמצעי זה
  const available = useMemo(()=>{
    if(!itemName) return [];
    const name = itemName.trim();
    const result = ALL_SERIALS
      .filter(s=>s.name.trim()===name && !usedSerials.has(s.serial))
      .map(s=>s.serial);
    return result;
  },[itemName, usedSerials]);

  // סידוריים שמתאימים לחיפוש
  const filtered = useMemo(()=>{
    const q = query.trim();
    if(!q) return available.slice(0,80);
    return available.filter(s=>String(s).includes(q)).slice(0,80);
  },[available, query]);

  useEffect(()=>{
    function handleClick(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",handleClick);
    return ()=>document.removeEventListener("mousedown",handleClick);
  },[]);

  function select(serial){
    onChange(String(serial));
    setQuery(String(serial));
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1}}>
      <div style={{display:"flex",gap:4}}>
        <input
          value={query}
          onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          placeholder={available.length>0?`${available.length} זמינים...`:"הזן סידורי"}
          style={{...S.input,marginBottom:0,flex:1}}
          inputMode="numeric"
        />
        <button onClick={()=>setOpen(o=>!o)} type="button"
          style={{...S.btn(available.length>0?"blue":"gray"),padding:"6px 10px",flexShrink:0,fontSize:12,minWidth:52}}>
          {available.length>0?`▾ ${available.length}`:"▾ 0"}
        </button>
      </div>
      {open&&available.length>0&&(
        <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#0d1117",border:"1px solid #388bfd",borderRadius:8,zIndex:100,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.6)"}}>
          <div style={{padding:"6px 10px",borderBottom:"1px solid #21262d",fontSize:11,color:"#8b949e"}}>
            {available.length} זמינים בנשקייה • {ALL_SERIALS.filter(s=>s.name.trim()===(itemName||"").trim()).length} סה"כ
          </div>
          {filtered.map(serial=>(
            <div key={serial} onClick={()=>select(serial)}
              style={{padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"monospace",borderBottom:"1px solid #161b22"}}
              onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {serial}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SignaturePad({onSave}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const last=useRef(null);
  const [hasStrokes,setHasStrokes]=useState(false);
  function pos(e,canvas){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};
  }
  function start(e){e.preventDefault();drawing.current=true;last.current=pos(e,canvasRef.current);}
  function move(e){
    e.preventDefault();if(!drawing.current)return;
    const c=canvasRef.current,ctx=c.getContext("2d"),p=pos(e,c);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="#3fb950";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();
    last.current=p;setHasStrokes(true);
  }
  function end(e){e.preventDefault();drawing.current=false;}
  function clear(){canvasRef.current.getContext("2d").clearRect(0,0,500,150);setHasStrokes(false);}
  return (
    <div>
      <div style={{border:"2px dashed #30363d",borderRadius:10,background:"#0d1117",touchAction:"none",marginBottom:10,position:"relative"}}>
        {!hasStrokes&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#484f58",fontSize:13,pointerEvents:"none"}}>✍️ חתום כאן באצבע</div>}
        <canvas ref={canvasRef} width={500} height={150} style={{width:"100%",height:150,display:"block",borderRadius:8,cursor:"crosshair"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={clear} style={{...S.btn("red"),flex:1}}>🗑️ נקה</button>
        <button onClick={()=>hasStrokes&&onSave(canvasRef.current.toDataURL())} disabled={!hasStrokes} style={{...S.btn("green"),flex:2,opacity:hasStrokes?1:0.4}}>✅ אשר חתימה</button>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  function go(){
    const uTrim=user.trim();
    const pTrim=pass.trim();
    if(!uTrim||!pTrim){setErr("נא למלא שם ומספר אישי");return;}
    // בדוק מנפקים לפי שם משתמש + מספר אישי כסיסמה
    const dynUsers=loadDB()?.dynamicUsers||{};
    const u=USERS[uTrim]||dynUsers[uTrim];
    if(u && pTrim===u.pass){
      onLogin({role:u.role,name:u.name,username:uTrim,soldierId:u.soldierId,viewUnit:u.viewUnit||null});
      return;
    }
    // בדוק חייל — שם פרטי + מספר אישי
    const s=RAW_SOLDIERS.find(x=>x.id===pTrim);
    if(s && (s.name.split(" ")[0]===uTrim||s.name.includes(uTrim)||uTrim===pTrim)){
      onLogin({role:"soldier",name:s.name,soldierId:s.id});
      return;
    }
    // fallback: חייל עם מספר אישי בשני השדות
    const byId=RAW_SOLDIERS.find(x=>x.id===uTrim);
    if(byId && pTrim===uTrim){
      onLogin({role:"soldier",name:byId.name,soldierId:byId.id});
      return;
    }
    setErr("שם משתמש או מספר אישי שגויים");
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d1117"}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380,boxShadow:"0 24px 48px rgba(0,0,0,.6)"}}>

function SoldierSignView({auth,onLogout,db,setDb}){
  const soldier=RAW_SOLDIERS.find(s=>s.id===auth.soldierId);
  const sig=db.signatures?.[auth.soldierId];
  const assigned=auth.assignedFromLink&&Object.keys(auth.assignedFromLink).length>0?auth.assignedFromLink:(db.assignments?.[auth.soldierId]||soldier?.assigned||{});

  // האזנה ל-Firebase גם בצד החייל
  useEffect(()=>{
    const off1 = fbOn("db/signatures", (sigs)=>{
      setDb(prev=>({...prev, signatures: cleanSigs(sigs)}));
    });
    return ()=>{ off1(); };
  },[]);
  const [step,setStep]=useState(sig?"done":"review");
  const [sigImg,setSigImg]=useState(sig?.sigData||null);
  const [testImg,setTestImg]=useState(sig?.testImg||null);
  const [showTestUpload,setShowTestUpload]=useState(false);
  if(!soldier){
    // חייל מותאם אישית — צור אובייקט זמני
    const customSoldier = Object.values(db.customSoldiers||{}).find(s=>s.id===auth.soldierId);
    if(!customSoldier) return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#f85149",flexDirection:"column",gap:10}}><div style={{fontSize:40}}>⚠️</div><div>חייל לא נמצא במערכת</div><div style={{fontSize:12,color:"#8b949e"}}>מ.א: {auth.soldierId}</div></div>;
  }
  const soldierData = soldier || Object.values(db.customSoldiers||{}).find(s=>s.id===auth.soldierId) || {id:auth.soldierId,name:auth.name,unit:"—",phone:"—"};
  const items=Object.entries(assigned);
  const weapons=items.filter(([k])=>WEAPON_KEYS.includes(k));
  const accessories=items.filter(([k])=>!WEAPON_KEYS.includes(k));
  function doSign(sigData){
    const signedAt=todayStr()+" "+nowStr();
    // הסר מרשימת ערב מרוכז אם קיים
    const newGuarantors={...(db.bulkGuarantors||{})};
    Object.keys(newGuarantors).forEach(k=>{
      const g=newGuarantors[k];
      if(g.remaining&&g.remaining[auth.soldierId]){
        const newRem={...g.remaining};delete newRem[auth.soldierId];
        newGuarantors[k]={...g, remaining:newRem};
      }
    });
    const newDb={...db,
      signatures:{...db.signatures,[auth.soldierId]:{sigData,signedAt,...(testImg?{testImg}:{})}},
      bulkGuarantors:newGuarantors
    };
    saveDB(newDb);setDb(newDb);setSigImg(sigData);setStep("done");
  }
  return (
    <div style={{minHeight:"100vh",background:"#0d1117"}}>
      <div style={{background:"#161b22",borderBottom:"1px solid #21262d",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:700,fontSize:15}}>🪖 {soldierData.name}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{color:"#8b949e",fontSize:12}}>פלוגה {soldierData.unit}</span>
          <button onClick={onLogout} style={{...S.btn(),padding:"5px 10px",fontSize:12}}>יציאה</button>
        </div>
      </div>
      <div style={{maxWidth:520,margin:"0 auto",padding:"20px 14px"}}>
        {step==="review"&&(
          <div style={{...S.card,border:"1px solid #388bfd"}}>
            <div style={{color:"#388bfd",fontWeight:700,fontSize:14,marginBottom:12}}>📋 טופס החתמה אישי</div>
            <div style={{background:"#0d1117",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#8b949e"}}>
              שם: <strong style={{color:"#e6edf3"}}>{soldierData.name}</strong> • מ.א: <strong style={{color:"#e6edf3"}}>{soldierData.id}</strong> • פלוגה: <strong style={{color:"#e6edf3"}}>{soldierData.unit}</strong>
            </div>
            {items.length===0
              ?<div style={{textAlign:"center",padding:20}}>
              <div style={{fontSize:40,marginBottom:8}}>⚠️</div>
              <p style={{color:"#e3b341",fontWeight:700,fontSize:15,marginBottom:6}}>אין אמצעים משויכים</p>
              <p style={{color:"#8b949e",fontSize:13}}>פנה למנפק לשיוך אמצעים לפני החתימה</p>
            </div>
              :<table style={{width:"100%",borderCollapse:"collapse",marginBottom:16}}>
                <thead><tr style={{background:"#0d1117"}}>
                  <th style={S.th}>אמצעי</th><th style={S.th}>מס' סידורי</th><th style={{...S.th,textAlign:"center"}}>כמות</th>
                </tr></thead>
                <tbody>
                  {weapons.map(([name,val])=>(
                    <tr key={name}><td style={{...S.td,fontWeight:700}}>{name}<br/><span style={{color:"#484f58",fontSize:10,fontWeight:"normal"}}>{getMakat(name)||""}</span></td><td style={{...S.td,fontFamily:"monospace",color:"#8b949e",fontSize:12}}>{isSerial(val)?val:"—"}</td><td style={{...S.td,textAlign:"center"}}>1</td></tr>
                  ))}
                  {accessories.map(([name,val])=>(
                    <tr key={name}><td style={{...S.td,color:"#388bfd"}}>{name}<br/><span style={{color:"#484f58",fontSize:10}}>{getMakat(name)||""}</span></td><td style={{...S.td,fontFamily:"monospace",color:"#8b949e",fontSize:12}}>{isSerial(val)?val:"—"}</td><td style={{...S.td,textAlign:"center"}}>1</td></tr>
                  ))}
                </tbody>
              </table>
            }
            {items.length>0&&<button onClick={()=>setStep("sign")} style={{...S.btn("green"),width:"100%",padding:"13px 0",fontSize:15}}>✍️ עבור לחתימה</button>}
          </div>
        )}
        {step==="sign"&&(
          <div>
            <div style={{...S.card,border:"1px solid #e3b341",marginBottom:12}}>
              <div style={{color:"#e3b341",fontWeight:700,marginBottom:8}}>✍️ חתימה על {items.length} אמצעים</div>
              <p style={{color:"#8b949e",fontSize:13,marginBottom:14}}>בחתימתך אתה מאשר קבלת האמצעים המפורטים</p>
              <SignaturePad onSave={doSign}/>
            </div>
            <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:"#e3b341"}}>📸 העלה צילום מסך מבחן (אופציונלי)</div>
              {testImg
                ?<div style={{position:"relative",display:"inline-block"}}>
                  <img src={testImg} style={{maxHeight:80,borderRadius:6,border:"1px solid #30363d"}} alt="מבחן"/>
                  <button onClick={()=>setTestImg(null)} style={{position:"absolute",top:-6,right:-6,background:"#f85149",border:"none",borderRadius:"50%",width:18,height:18,color:"#fff",cursor:"pointer",fontSize:11}}>×</button>
                </div>
                :<label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",color:"#8b949e",fontSize:13}}>
                  <span style={{...S.btn(),padding:"6px 12px",fontSize:12}}>📎 בחר קובץ</span>
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                    const f=e.target.files[0]; if(!f) return;
                    const r=new FileReader(); r.onload=ev=>setTestImg(ev.target.result); r.readAsDataURL(f);
                  }}/>
                  <span>לא נבחר קובץ</span>
                </label>
              }
            </div>
            <button onClick={()=>setStep("review")} style={{...S.btn(),width:"100%"}}>← חזור לעיון</button>
          </div>
        )}
        {step==="done"&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:60,marginBottom:12}}>✅</div>
            <h2 style={{color:"#3fb950",fontSize:20,fontWeight:800,marginBottom:6}}>החתימה התקבלה!</h2>
            <p style={{color:"#8b949e",fontSize:13,marginBottom:16}}>נשמר במערכת • {db.signatures?.[auth.soldierId]?.signedAt}</p>
            <button onClick={()=>{
              const rows=items.map(([name,val])=>`<tr><td style="padding:6px 8px;border:1px solid #ccc;font-weight:${WEAPON_KEYS.includes(name)?"bold":"normal"}">${name}</td><td style="padding:6px 8px;border:1px solid #ccc;font-family:monospace">${isSerial(val)?val:"—"}</td></tr>`).join("");
              const sigHtml=sigImg?`<div style="margin-top:12px"><strong>חתימה:</strong><br/><img src="${sigImg}" style="height:60px;margin-top:6px" alt="חתימה"/></div>`:"<div style='color:red'>ללא חתימה</div>";
              const html=`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>טופס חתימה — ${soldierData.name}</title><style>body{font-family:Arial,sans-serif;padding:20px;direction:rtl;color:#000}h2{margin-bottom:4px}table{width:100%;border-collapse:collapse;margin:12px 0}th,td{border:1px solid #ccc;padding:6px 8px;text-align:right}th{background:#f0f0f0}.noprint{display:none}@media print{.noprint{display:none!important}}</style></head><body><h2>טופס החתמה — גדוד 9219</h2><p style="color:#555;font-size:13px">${soldierData.name} • מ.א: ${soldierData.id} • ${db.signatures?.[auth.soldierId]?.signedAt||todayStr()}</p><table><thead><tr><th>אמצעי</th><th>מספר סידורי</th></tr></thead><tbody>${rows}</tbody></table>${sigHtml}<p style="font-size:11px;color:#888;margin-top:16px">מסמך זה הינו העתק לעיון</p><button class="noprint" onclick="window.print()" style="margin-top:12px;padding:8px 20px;cursor:pointer;font-size:14px">🖨️ הדפס</button></body></html>`;
              const blob=new Blob([html],{type:"text/html;charset=utf-8"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");a.href=url;a.download=`חתימה-${soldierData.name}-${todayStr()}.html`;
              document.body.appendChild(a);a.click();document.body.removeChild(a);
              setTimeout(()=>URL.revokeObjectURL(url),3000);
            }} style={{...S.btn("green"),fontSize:14,padding:"11px 24px",marginBottom:16}}>

function SoldierDetail({soldier,db,onClose,onSave,onSendWA}){
  const [view,setView]=useState("profile");
  const [showDoc,setShowDoc]=useState(false);
  const [newItems,setNewItems]=useState([{name:"",serial:""}]);
  const [retSel,setRetSel]=useState([]);
  const assigned=db.assignments[soldier.id]??soldier.assigned??{};
  const sig=db.signatures?.[soldier.id];
  const weps=Object.entries(assigned).filter(([k])=>WEAPON_KEYS.includes(k));
  // ערבות מרוכזת — האם חייל זה ערב על אחרים?
  const myGuarantees=Object.values(db.bulkGuarantors||{}).filter(g=>g.repId===soldier.id);
  const totalRemaining=myGuarantees.reduce((sum,g)=>sum+(g.remaining||[]).length,0);

  function doCheckout(){
    const valid=newItems.filter(i=>i.name);if(!valid.length)return;
    const na={...assigned};valid.forEach(i=>{na[i.name]=i.serial||1;});
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }
  function doReturn(){
    if(!retSel.length)return;
    const na={...assigned};retSel.forEach(n=>delete na[n]);
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();

function QuickModal({soldiers,db,onSave,onClose}){
  const [search,setSearch]=useState("");
  const [sid,setSid]=useState("");
  const [type,setType]=useState("checkout");
  const [items,setItems]=useState([{name:"",serial:""}]);
  const [retSel,setRetSel]=useState([]);
  const matched=useMemo(()=>{if(!search.trim())return[];const q=search.toLowerCase();return soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,8);},[search,soldiers]);
  const soldier=soldiers.find(s=>s.id===sid);
  const assigned=soldier?(db.assignments[soldier.id]??soldier.assigned??{}):{};

  function doCheckout(){
    const valid=items.filter(i=>i.name);if(!valid.length||!soldier)return;
    const na={...assigned};valid.forEach(i=>{na[i.name]=i.serial||1;});
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }
  function doReturn(){
    if(!retSel.length||!soldier)return;
    const na={...assigned};retSel.forEach(n=>delete na[n]);
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();

    <Modal title="משיכה / החזרה" onClose={onClose} wide>

      {matched.length>0&&!sid&&(
        <div style={{background:"#0d1117",border:"1px solid #30363d",borderRadius:8,marginTop:-8,marginBottom:10,overflow:"hidden"}}>
          {matched.map(s=>(
            <div key={s.id} onClick={()=>{setSid(s.id);setSearch(s.name);}} style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #21262d",fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#1c2128"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <strong>{s.name}</strong> <span style={{color:"#8b949e"}}>{s.id} • פלוגה {s.unit}</span>
            </div>
          ))}
        </div>
      )}
      {soldier&&<div style={{background:"#0d1117",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13}}>✅ <strong>{soldier.name}</strong> • {Object.keys(assigned).length} פריטים</div>}
      {soldier&&type==="checkout"&&(
        <div>
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
              <select value={item.name} onChange={e=>{const n=[...items];n[i]={...n[i],name:e.target.value};setItems(n);}} style={{...S.input,marginBottom:0,flex:2}}>
                <option value="">— בחר אמצעי —</option>

function GroupSignModal({db, soldiers, onClose}){
  const [groupName, setGroupName] = useState("");
  const [unit, setUnit] = useState("מסייעת");
  const [selectedIds, setSelectedIds] = useState([]);
  const [search, setSearch] = useState("");
  const [sigImg, setSigImg] = useState(null);
  const [showPad, setShowPad] = useState(false);
  const [done, setDone] = useState(false);

  const unitSoldiers = useMemo(()=>{
    const q=search.toLowerCase();
    return soldiers.filter(s=>s.unit===unit&&Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k)))
      .filter(s=>!q||s.name.toLowerCase().includes(q)||s.id.includes(q));
  },[soldiers,unit,search]);

  function toggleSoldier(id){
    setSelectedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  }
  function selectAll(){setSelectedIds(unitSoldiers.map(s=>s.id));}
  function clearAll(){setSelectedIds([]);}

  const selected = soldiers.filter(s=>selectedIds.includes(s.id));
  // Flatten all equipment from selected soldiers
  const allEquipment = [];
  selected.forEach(s=>{
    Object.entries(s.assigned||{}).forEach(([name,val])=>{
      allEquipment.push({soldierName:s.name,name,val});
    });
  });

  function doGroupSign(){
    if(!sigImg||selectedIds.length===0) return;
    const signedAt=todayStr()+" "+nowStr();
    const newSigs={...(db.signatures||{})};
    selectedIds.forEach(id=>{
      const s=soldiers.find(x=>x.id===id);
      if(s) newSigs[id]={sigData:sigImg,signedAt,groupSign:groupName||"שובר מרוכז"};
    });
    const ndb={...db,signatures:newSigs};
    saveDB(ndb);
    setDone(true);
  }

  const units=["א","ב","ג","מסייעת","אג\"מ","פלס\"מ"];

  return (
    <Modal title="✍️ שובר חתימה מרוכז" onClose={onClose} wide>

        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={S.label}>שם השובר (אופציונלי)</label>
              <input value={groupName} onChange={e=>setGroupName(e.target.value)}
                placeholder="לדוגמה: שובר מסייעת מרץ" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>פלוגה</label>
              <select value={unit} onChange={e=>{setUnit(e.target.value);setSelectedIds([]);}} style={S.input}>
                {units.map(u=><option key={u} value={u}>{u}</option>)}

            </div>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש בפלוגה..." style={{...S.input,flex:1,marginBottom:0}}/>
            <button onClick={selectAll} style={{...S.btn("blue"),padding:"7px 12px",fontSize:12,flexShrink:0}}>בחר הכל</button>
            <button onClick={clearAll} style={{...S.btn("red"),padding:"7px 12px",fontSize:12,flexShrink:0}}>נקה</button>
          </div>

          <div style={{background:"#0d1117",borderRadius:8,maxHeight:220,overflowY:"auto",marginBottom:14,border:"1px solid #21262d"}}>
            {unitSoldiers.length===0
              ?<div style={{padding:16,textAlign:"center",color:"#8b949e",fontSize:13}}>אין חיילים עם נשק בפלוגה זו</div>
              :unitSoldiers.map(s=>{
                const sel=selectedIds.includes(s.id);

                return (
                  <label key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid #161b22",background:sel?"#1a2f4a":"transparent"}}>

                {selected.map(s=>(

                    <div style={{color:"#8b949e",paddingRight:12}}>
                      {Object.entries(s.assigned||{}).map(([n,v])=>`${n}${isSerial(v)?" ("+v+")":""}`).join(" • ")}
                    </div>

                ))}
              </div>
            </div>
          )}

          {selectedIds.length>0&&(
            <div>
              <label style={S.label}>חתימה אחת לכולם</label>
              {sigImg
                ?<div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
                  <img src={sigImg} style={{height:50,borderRadius:6,border:"1px solid #238636"}} alt="חתימה"/>

                :<button onClick={()=>setShowPad(true)} style={{...S.btn("orange"),width:"100%",padding:"11px 0",marginBottom:12}}>✍️ חתום כאן</button>

            </div>

        </div>
      ):(
        <div style={{textAlign:"center",padding:20}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h3 style={{color:"#3fb950",fontSize:18,fontWeight:800,marginBottom:8}}>השובר נחתם!</h3>
          <p style={{color:"#8b949e",marginBottom:4}}>{selectedIds.length} חיילים חתמו במרוכז</p>
          <p style={{color:"#484f58",fontSize:12}}>{groupName||"שובר מרוכז"} • {todayStr()}</p>
          <button onClick={onClose} style={{...S.btn("green"),marginTop:16,padding:"10px 30px"}}>סגור</button>

      {showPad&&<Modal title="חתימה מרוכזת" onClose={()=>setShowPad(false)}><SignaturePad onSave={d=>{setSigImg(d);setShowPad(false);}}/></Modal>}
    </Modal>
  );
}

function BrokenEquipmentTab({db, setDb, soldiers, auth}){
  const [items, setItems] = useState(()=>(db.brokenItems||[]));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({soldierSearch:"",soldierId:"",itemName:"",serial:"",note:"",severity:"בינוני"});
  const [filterSev, setFilterSev] = useState("הכל");

  // sync from db
  useEffect(()=>setItems(db.brokenItems||[]),[db.brokenItems]);

  function setF(k,v){setForm(p=>({...p,[k]:v}));}

  function addItem(){
    if(!form.itemName.trim()){return;}
    const newItem={
      id:Date.now()+"",
      soldierId:form.soldierId,
      soldierName:soldiers.find(s=>s.id===form.soldierId)?.name||"—",
      itemName:form.itemName.trim(),
      serial:form.serial.trim(),
      note:form.note.trim(),
      severity:form.severity,
      reportedAt:todayStr()+" "+nowStr(),
      reportedBy:auth.name,
      status:"פתוח",
    };
    const updated=[newItem,...items];
    const ndb={...db, brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
    setForm({soldierSearch:"",soldierId:"",itemName:"",serial:"",note:"",severity:"בינוני"});
    setShowForm(false);
  }

  function closeItem(id){
    const updated=items.map(i=>i.id===id?{...i,status:"סגור",closedAt:todayStr()}:i);
    const ndb={...db,brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
  }

  function deleteItem(id){
    const updated=items.filter(i=>i.id!==id);
    const ndb={...db,brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
  }

  const shown = filterSev==="הכל" ? items : items.filter(i=>i.severity===filterSev);
  const openCount = items.filter(i=>i.status==="פתוח").length;

  const [soldierSuggestions, setSoldierSuggestions]=useState([]);
  function onSoldierSearch(v){
    setF("soldierSearch",v);setF("soldierId","");
    if(!v.trim()){setSoldierSuggestions([]);return;}
    const q=v.toLowerCase();
    setSoldierSuggestions(soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6));
  }

  const sevColors={קל:"blue",בינוני:"orange",חמור:"red"};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:0,fontSize:20,fontWeight:800}}>🔧 אמצעי תקול</h2>
          {openCount>0&&<div style={{color:"#f85149",fontSize:13,marginTop:2}}>{openCount} תקלות פתוחות</div>}
        </div>
        <button onClick={()=>setShowForm(true)} style={{...S.btn("orange")}}>+ דווח תקלה</button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {["הכל","פתוח","סגור"].map(s=>(
          <button key={s} onClick={()=>setFilterSev(s)}
            style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:13,fontWeight:600,
              borderColor:filterSev===s?"#e3b341":"#30363d",background:filterSev===s?"#3d2a1a":"#0d1117",
              color:filterSev===s?"#e3b341":"#8b949e"}}>{s}</button>
        ))}
      </div>

      {shown.length===0
        ?<div style={{...S.card,textAlign:"center",padding:32,color:"#8b949e"}}>
          <div style={{fontSize:40,marginBottom:8}}>🔧</div>
          <div>אין דיווחי תקלה</div>
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {shown.map(item=>(
            <div key={item.id} style={{...S.card,marginBottom:0,border:`1px solid ${item.status==="סגור"?"#21262d":item.severity==="חמור"?"#6e2020":item.severity==="בינוני"?"#5a3e1b":"#1f3a5f"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:15}}>{item.itemName}</span>
                    {item.serial&&<span style={{fontFamily:"monospace",fontSize:12,color:"#8b949e"}}>{item.serial}</span>}
                    <Badge color={sevColors[item.severity]||"gray"} small>{item.severity}</Badge>
                    <Badge color={item.status==="סגור"?"green":"orange"} small>{item.status}</Badge>
                  </div>
                  {item.soldierName&&item.soldierName!=="—"&&(
                    <div style={{fontSize:12,color:"#8b949e",marginBottom:4}}>👤 {item.soldierName} ({item.soldierId})</div>
                  )}
                  {item.note&&<div style={{fontSize:13,color:"#e6edf3",background:"#0d1117",borderRadius:6,padding:"6px 10px",marginBottom:4}}>{item.note}</div>}
                  <div style={{fontSize:11,color:"#484f58"}}>
                    דווח ע"י {item.reportedBy} • {item.reportedAt}
                    {item.closedAt&&<span> • נסגר: {item.closedAt}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {item.status==="פתוח"&&<button onClick={()=>closeItem(item.id)} style={{...S.btn("green"),padding:"5px 10px",fontSize:12}}>✅ סגור</button>}
                  <button onClick={()=>deleteItem(item.id)} style={{...S.btn("red"),padding:"5px 10px",fontSize:12}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      }

      {showForm&&(
        <Modal title="דיווח אמצעי תקול" onClose={()=>setShowForm(false)} wide>
          <div style={{position:"relative",marginBottom:8}}>
            <label style={S.label}>חייל (אופציונלי)</label>
            <input value={form.soldierSearch} onChange={e=>onSoldierSearch(e.target.value)}
              placeholder="חיפוש שם / מספר אישי..." style={S.input}/>
            {soldierSuggestions.length>0&&!form.soldierId&&(
              <div style={{background:"#0d1117",border:"1px solid #388bfd",borderRadius:8,marginTop:-8,marginBottom:8}}>
                {soldierSuggestions.map(s=>(
                  <div key={s.id} onClick={()=>{setF("soldierSearch",s.name);setF("soldierId",s.id);setSoldierSuggestions([]);}}
                    style={{padding:"8px 12px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #161b22"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    {s.name} <span style={{color:"#8b949e"}}>{s.id} • פלוגה {s.unit}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={S.label}>שם האמצעי *</label>
              <select value={form.itemName} onChange={e=>setF("itemName",e.target.value)} style={S.input}>
                <option value="">— בחר אמצעי —</option>
                {EQ_COLS.map(eq=><option key={eq} value={eq}>{eq}</option>)}
              </select>
            </div>
            <div>
              <label style={S.label}>מספר סידורי</label>
              <input value={form.serial} onChange={e=>setF("serial",e.target.value)}
                placeholder="מספר סידורי" style={S.input} inputMode="numeric"/>
            </div>
          </div>
          <label style={S.label}>חומרה</label>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {["קל","בינוני","חמור"].map(sev=>(
              <button key={sev} onClick={()=>setF("severity",sev)}
                style={{flex:1,padding:"8px 0",borderRadius:8,border:"1.5px solid",cursor:"pointer",fontWeight:600,fontSize:13,
                  borderColor:form.severity===sev?"#388bfd":"#30363d",
                  background:form.severity===sev?"#1f3a5f":"#0d1117",
                  color:form.severity===sev?"#388bfd":"#8b949e"}}>{sev}</button>
            ))}
          </div>
          <label style={S.label}>תיאור התקלה</label>
          <textarea value={form.note} onChange={e=>setF("note",e.target.value)}
            placeholder="תאר את התקלה בפירוט..." style={{...S.input,height:90,resize:"vertical"}}/>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button onClick={addItem} disabled={!form.itemName} style={{...S.btn("orange"),flex:2,padding:"11px 0",opacity:form.itemName?1:0.5}}>🔧 דווח תקלה</button>
            <button onClick={()=>setShowForm(false)} style={{...S.btn(),flex:1}}>ביטול</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ManagerApp({auth,onLogout}){
  const [db,setDb]=useState(()=>initDB());
  const [tab,setTab]=useState("dashboard");
  const [lastRefresh,setLastRefresh]=useState(new Date());
  const [dashModal,setDashModal]=useState(null); // "signed" | "unsigned" | "withWeapon" | "all"
  const [searchModal,setSearchModal]=useState(false);
  const [dashUnitFilter,setDashUnitFilter]=useState("הכל");

  // רענון אוטומטי כל 60 שניות
  useEffect(()=>{
    const interval=setInterval(()=>{
      setLastRefresh(new Date());
    },60000);
    return ()=>clearInterval(interval);
  },[]);

  // האזנה ל-Firebase בזמן אמת
  useEffect(()=>{
    const off1 = fbOn("db/signatures", (sigs)=>{
      setDb(prev=>{
        const updated={...prev, signatures: cleanSigs(sigs)};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off2 = fbOn("db/assignments", (assignments)=>{
      setDb(prev=>{
        const updated={...prev, assignments: assignments||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off3 = fbOn("db/customSoldiers", (custom)=>{
      setDb(prev=>{
        const updated={...prev, customSoldiers: custom||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off4 = fbOn("db/brokenItems", (broken)=>{
      setDb(prev=>{
        const updated={...prev, brokenItems: broken||[]};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off5 = fbOn("db/bulkGuarantors", (guarantors)=>{
      setDb(prev=>({...prev, bulkGuarantors: guarantors||{}}));
    });
    const off6 = fbOn("db/userPerms", (perms)=>{
      setDb(prev=>({...prev, userPerms: perms||{}}));
    });
    const off7 = fbOn("db/dynamicUsers", (dynUsers)=>{
      setDb(prev=>({...prev, dynamicUsers: dynUsers||{}}));
    });
    const off8 = fbOn("db/unitItems", (unitItems)=>{
      const items = unitItems||{};
      if(Object.keys(items).length===0){
        // First time - seed with imported data
        fbSet("db/unitItems", INITIAL_UNIT_ITEMS).catch(()=>{});
        setDb(prev=>({...prev, unitItems: INITIAL_UNIT_ITEMS}));
      } else {
        setDb(prev=>({...prev, unitItems: items}));
      }
    });
    return ()=>{ off1(); off2(); off3(); off4(); off5(); off6(); off7(); off8(); };
  },[]);
  const [search,setSearch]=useState("");
  const [filterUnit,setFilterUnit]=useState("הכל");
  const [selSoldier,setSelSoldier]=useState(null);
  const [dailyType,setDailyType]=useState(null);
  const [quickModal,setQuickModal]=useState(false);
  const [bulkModal,setBulkModal]=useState(false);
  const [mobileMenu,setMobileMenu]=useState(false);
  const [addModal,setAddModal]=useState(false);

  const units=useMemo(()=>["הכל",...[...new Set(RAW_SOLDIERS.map(s=>s.unit).filter(Boolean))].sort()],[]);
  const soldiers=useMemo(()=>{
    const assignments = db.assignments||{};
    const signatures = db.signatures||{};
    const customSoldiers = db.customSoldiers||{};
    const custom=Object.values(customSoldiers);
    const base=RAW_SOLDIERS.filter(s=>!customSoldiers[s.id]);
    const guarantors=db.bulkGuarantors||{};
    return [...custom,...base].map(s=>{
      const guarantee=Object.values(guarantors).find(g=>g.remaining&&g.remaining[s.id]);
      return {...s,assigned:assignments[s.id]??s.assigned,signature:signatures[s.id]?.sigData||null,signedAt:signatures[s.id]?.signedAt||null,guarantee:guarantee||null};
    });
  },[db]);
  const filtered=useMemo(()=>{let l=soldiers;if(filterUnit!=="הכל")l=l.filter(s=>s.unit===filterUnit);if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)||(s.squad||"").toLowerCase().includes(q));}return l;},[soldiers,filterUnit,search]);

  const withWeapons=useMemo(()=>soldiers.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k))).length,[soldiers]);
  const signedCount=useMemo(()=>soldiers.filter(s=>s.signature).length,[soldiers]);
  const unsigned=withWeapons-signedCount;

  function sendWhatsApp(soldier){
    const phone=phoneToWA(soldier.phone);
    if(!phone){alert("אין מספר טלפון לחייל זה");return;}
    const link="https://orenh943-cell.github.io/armory-9219";
    const assigned=soldier.assigned||{};
    const compactData={};
    Object.entries(assigned).forEach(([name,val])=>{
      const idx=EQ_COLS.indexOf(name);
      if(idx>=0) compactData[idx]=val;
    });
    // שימוש ב-btoa לקידוד קצר וללא תווים בעייתיים
    const encoded=btoa(JSON.stringify(compactData));
    const signLink=link+"?sign="+soldier.id+"&b="+encoded;
    const msg=`שלום ${soldier.name},\nנא לחתום על טופס ההחתמה האישי:\n${signLink}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");

function ViewerApp({auth, onLogout, db}){
  const [search,setSearch]=React.useState("");
  const [filterUnit,setFilterUnit]=React.useState(auth.viewUnit&&auth.viewUnit!=="הכל"?auth.viewUnit:"הכל");
  const units=["הכל",...[...new Set(RAW_SOLDIERS.map(s=>s.unit))].sort()];
  const soldiers=React.useMemo(()=>{
    const custom=Object.values(db.customSoldiers||{});
    const all=[...custom,...RAW_SOLDIERS];
    return all.map(s=>{
      const assigned=db.assignments?.[s.id]!==undefined?db.assignments[s.id]:s.assigned||{};
      const sig=db.signatures?.[s.id];
      return {...s,assigned,signature:!!sig};
    });
  },[db]);

  const filtered=React.useMemo(()=>{
    let l=soldiers;
    if(auth.viewUnit&&auth.viewUnit!=="הכל") l=l.filter(s=>s.unit===auth.viewUnit);
    else if(filterUnit!=="הכל") l=l.filter(s=>s.unit===filterUnit);
    if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q));}
    return l;
  },[soldiers,filterUnit,search,auth.viewUnit]);

  const signed=filtered.filter(s=>s.signature).length;
  const withWeapon=filtered.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k))).length;

  return (
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#e6edf3",padding:16,fontFamily:"system-ui,sans-serif",direction:"rtl"}}>
      <div style={{maxWidth:900,margin:"0 auto"}}>

        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {[
            {l:'סה"כ בסינון',v:filtered.length,c:"#388bfd"},
            {l:"חתומים",v:signed,c:"#3fb950"},
            {l:"ממתינים",v:withWeapon-signed,c:"#e3b341"},
          ].map(s=>(
            <div key={s.l} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"12px 8px",textAlign:"center"}}>

function downloadBulkForm(repName, repId, unit, soldiers, sigData, db){
  const dateStr = todayStr();
  const unitLabel = unit==="הכל" ? "כל הגדוד" : "פלוגה "+unit;

  // סכם כמויות לפי אמצעי
  const itemMap = {}; // {name: {qty, serials: [], makat}}
  soldiers.forEach(s => {
    const assigned = db.assignments?.[s.id] ?? s.assigned ?? {};
    Object.entries(assigned).forEach(([name, serial]) => {
      if(!itemMap[name]) itemMap[name] = {qty:0, serials:[], makat: NAME_TO_MAKAT[name]||""};
      itemMap[name].qty++;
      if(serial && serial!==1 && serial!==true) itemMap[name].serials.push(String(serial));
    });
  });

  // מיין — קודם נשק, אחר כך אביזרים
  const weaponItems = Object.entries(itemMap).filter(([k])=>WEAPON_KEYS.includes(k));
  const accessoryItems = Object.entries(itemMap).filter(([k])=>!WEAPON_KEYS.includes(k));
  const allItems = [...weaponItems, ...accessoryItems];

  let rows = "";
  let totalQty = 0;
  allItems.forEach(([name, data], i) => {
    totalQty += data.qty;
    const serialsText = data.serials.length > 0 ? data.serials.join(", ") : "—";
    const isWeapon = WEAPON_KEYS.includes(name);
    rows += `<tr>
      <td style="text-align:center">${i+1}</td>
      <td style="${isWeapon?"font-weight:bold":""}">${name}</td>
      <td style="text-align:center;font-family:monospace;font-size:11px">${data.makat||"—"}</td>
      <td style="text-align:center;font-weight:bold;font-size:15px">${data.qty}</td>
      <td style="font-size:11px;color:#555">${serialsText}</td>
    </tr>`;
  });

  const sigHtml = sigData
    ? `<img src="${sigData}" style="height:70px;border:1px solid #ccc;border-radius:4px;display:block;margin-top:6px"/>`
    : `<div style="height:70px;border:1px solid #999;border-radius:4px;margin-top:6px;width:240px"></div>`;

  const html = `<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<title>טופס ערבות מרוכז — ${unitLabel} — ${dateStr}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;direction:rtl;color:#000;padding:20px;font-size:13px}
  .top{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a1a2e;padding-bottom:10px;margin-bottom:14px}
