// נקה assigned מתוך signatures (Firebase לא אוהב מפתחות עם נקודות)
function cleanSigs(sigs){
  if(!sigs) return {};
  const out={};
  Object.entries(sigs).forEach(([id,sig])=>{
    const {assigned:_,...rest}=sig||{};
    out[id]=rest;
  });
  return out;
}

function SerialPicker({itemName, value, onChange, db}){
  const [query, setQuery] = useState(value||"");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  // כל הסידוריים המשויכים כרגע לחיילים (DB גובר על RAW)
  const usedSerials = useMemo(()=>{
    const used = new Set();
    // קודם כל RAW_SOLDIERS
    RAW_SOLDIERS.forEach(s=>{
      // אם יש override ב-DB נתעלם מה-RAW
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    // חיילים מותאמים אישית
    Object.values(db.customSoldiers||{}).forEach(s=>{
      const assigned = db.assignments[s.id] !== undefined ? db.assignments[s.id] : s.assigned;
      Object.values(assigned||{}).forEach(v=>{ if(v&&v!==1&&String(v).length>3) used.add(Number(v)); });
    });
    return used;
  },[db]);

  // סידוריים זמינים לאמצעי זה
  const available = useMemo(()=>{
    if(!itemName) return [];
    const name = itemName.trim();
    const result = ALL_SERIALS
      .filter(s=>s.name.trim()===name && !usedSerials.has(s.serial))
      .map(s=>s.serial);
    return result;
  },[itemName, usedSerials]);

  // סידוריים שמתאימים לחיפוש
  const filtered = useMemo(()=>{
    const q = query.trim();
    if(!q) return available.slice(0,80);
    return available.filter(s=>String(s).includes(q)).slice(0,80);
  },[available, query]);

  useEffect(()=>{
    function handleClick(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",handleClick);
    return ()=>document.removeEventListener("mousedown",handleClick);
  },[]);

  function select(serial){
    onChange(String(serial));
    setQuery(String(serial));
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1}}>
      <div style={{display:"flex",gap:4}}>
        <input
          value={query}
          onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          placeholder={available.length>0?`${available.length} זמינים...`:"הזן סידורי"}
          style={{...S.input,marginBottom:0,flex:1}}
          inputMode="numeric"
        />
        <button onClick={()=>setOpen(o=>!o)} type="button"
          style={{...S.btn(available.length>0?"blue":"gray"),padding:"6px 10px",flexShrink:0,fontSize:12,minWidth:52}}>
          {available.length>0?`▾ ${available.length}`:"▾ 0"}
        </button>
      </div>
      {open&&available.length>0&&(
        <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#0d1117",border:"1px solid #388bfd",borderRadius:8,zIndex:100,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.6)"}}>
          <div style={{padding:"6px 10px",borderBottom:"1px solid #21262d",fontSize:11,color:"#8b949e"}}>
            {available.length} פריטים זמינים בנשקייה
          </div>
          {filtered.map(serial=>(
            <div key={serial} onClick={()=>select(serial)}
              style={{padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"monospace",borderBottom:"1px solid #161b22"}}
              onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {serial}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SignaturePad({onSave}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const last=useRef(null);
  const [hasStrokes,setHasStrokes]=useState(false);
  function pos(e,canvas){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};
  }
  function start(e){e.preventDefault();drawing.current=true;last.current=pos(e,canvasRef.current);}
  function move(e){
    e.preventDefault();if(!drawing.current)return;
    const c=canvasRef.current,ctx=c.getContext("2d"),p=pos(e,c);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="#3fb950";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();
    last.current=p;setHasStrokes(true);
  }
  function end(e){e.preventDefault();drawing.current=false;}
  function clear(){canvasRef.current.getContext("2d").clearRect(0,0,500,150);setHasStrokes(false);}
  return (
    <div>
      <div style={{border:"2px dashed #30363d",borderRadius:10,background:"#0d1117",touchAction:"none",marginBottom:10,position:"relative"}}>
        {!hasStrokes&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#484f58",fontSize:13,pointerEvents:"none"}}>✍️ חתום כאן באצבע</div>}
        <canvas ref={canvasRef} width={500} height={150} style={{width:"100%",height:150,display:"block",borderRadius:8,cursor:"crosshair"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={clear} style={{...S.btn("red"),flex:1}}>🗑️ נקה</button>
        <button onClick={()=>hasStrokes&&onSave(canvasRef.current.toDataURL())} disabled={!hasStrokes} style={{...S.btn("green"),flex:2,opacity:hasStrokes?1:0.4}}>✅ אשר חתימה</button>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  function go(){
    const uTrim=user.trim();
    const pTrim=pass.trim();
    if(!uTrim||!pTrim){setErr("נא למלא שם ומספר אישי");return;}
    // בדוק מנפקים לפי שם משתמש + מספר אישי כסיסמה
    const u=USERS[uTrim];
    if(u && pTrim===u.pass){
      onLogin({role:u.role,name:u.name,username:uTrim,soldierId:u.soldierId,viewUnit:u.viewUnit||null});
      return;
    }
    // בדוק חייל — שם פרטי + מספר אישי
    const s=RAW_SOLDIERS.find(x=>x.id===pTrim);
    if(s && (s.name.split(" ")[0]===uTrim||s.name.includes(uTrim)||uTrim===pTrim)){
      onLogin({role:"soldier",name:s.name,soldierId:s.id});
      return;
    }
    // fallback: חייל עם מספר אישי בשני השדות
    const byId=RAW_SOLDIERS.find(x=>x.id===uTrim);
    if(byId && pTrim===uTrim){
      onLogin({role:"soldier",name:byId.name,soldierId:byId.id});
      return;
    }
    setErr("שם משתמש או מספר אישי שגויים");
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d1117"}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380,boxShadow:"0 24px 48px rgba(0,0,0,.6)"}}>

          <p style={{color:"#8b949e",fontSize:12}}>גדוד 9219</p>

          placeholder="אורן / שם פרטי" style={S.input} autoFocus/>
        <label style={S.label}>מספר אישי (סיסמה)</label>
        <input value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()}

        </div>
      </div>

function SoldierDetail({soldier,db,onClose,onSave,onSendWA}){
  const [view,setView]=useState("profile");
  const [showDoc,setShowDoc]=useState(false);
  const [newItems,setNewItems]=useState([{name:"",serial:""}]);
  const [retSel,setRetSel]=useState([]);
  const assigned=db.assignments[soldier.id]??soldier.assigned??{};
  const sig=db.signatures?.[soldier.id];
  const weps=Object.entries(assigned).filter(([k])=>WEAPON_KEYS.includes(k));
  // ערבות מרוכזת — האם חייל זה ערב על אחרים?
  const myGuarantees=Object.values(db.bulkGuarantors||{}).filter(g=>g.repId===soldier.id);
  const totalRemaining=myGuarantees.reduce((sum,g)=>sum+(g.remaining||[]).length,0);

  function doCheckout(){
    const valid=newItems.filter(i=>i.name);if(!valid.length)return;
    const na={...assigned};valid.forEach(i=>{na[i.name]=i.serial||1;});
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }
  function doReturn(){
    if(!retSel.length)return;
    const na={...assigned};retSel.forEach(n=>delete na[n]);
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }
  function clearSig(){
    const ndb={...db,signatures:{...(db.signatures||{})}};delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);
  }

  return (
    <Modal title={`${soldier.name} • ${soldier.id}`} onClose={onClose} wide>

        ))}

      {view==="profile"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[["פלוגה",soldier.unit],["מחלקה",soldier.squad||"—"],["טלפון",soldier.phone||"—"],["מ. אישי",soldier.id]].map(([l,v])=>(

                <div style={{fontWeight:600,fontSize:13,marginTop:2}}>{v}</div>

                <div style={{fontSize:11,color:"#8b949e",marginBottom:4}}>סטטוס חתימה</div>

                <button onClick={()=>setShowDoc(true)} style={{...S.btn("purple"),padding:"6px 10px",fontSize:12}}>📄 טופס</button>

                  <input type="checkbox" checked={retSel.includes(name)} onChange={e=>setRetSel(p=>e.target.checked?[...p,name]:p.filter(x=>x!==name))}/>
                  <div style={{flex:1}}><span style={{fontSize:13,fontWeight:600,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>{name}</span><span style={{color:"#484f58",fontSize:10,marginRight:4}}>({getMakat(name)||"—"})</span></div>{isSerial(val)&&<span style={{color:"#8b949e",fontFamily:"monospace",fontSize:11}}>{val}</span>}
                </label>
              ))}
              <button onClick={doReturn} disabled={!retSel.length} style={{...S.btn("orange"),width:"100%",padding:"11px 0",marginTop:8,opacity:retSel.length?1:0.5}}>🔄 בטל שיוך ({retSel.length})</button>
            </>
          }

      )}

    </Modal>
  );
}

function QuickModal({soldiers,db,onSave,onClose}){
  const [search,setSearch]=useState("");
  const [sid,setSid]=useState("");
  const [type,setType]=useState("checkout");
  const [items,setItems]=useState([{name:"",serial:""}]);
  const [retSel,setRetSel]=useState([]);
  const matched=useMemo(()=>{if(!search.trim())return[];const q=search.toLowerCase();return soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,8);},[search,soldiers]);
  const soldier=soldiers.find(s=>s.id===sid);
  const assigned=soldier?(db.assignments[soldier.id]??soldier.assigned??{}):{};

  function doCheckout(){
    const valid=items.filter(i=>i.name);if(!valid.length||!soldier)return;
    const na={...assigned};valid.forEach(i=>{na[i.name]=i.serial||1;});
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }
  function doReturn(){
    if(!retSel.length||!soldier)return;
    const na={...assigned};retSel.forEach(n=>delete na[n]);
    const ndb={...db,assignments:{...(db.assignments||{}),[soldier.id]:na},signatures:{...(db.signatures||{})}};
    delete ndb.signatures[soldier.id];saveDB(ndb);onSave(ndb);onClose();
  }

  return (
    <Modal title="משיכה / החזרה" onClose={onClose} wide>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["checkout","➕ משיכה"],["return","➖ החזרה"]].map(([t,l])=>(
          <button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1.5px solid",borderColor:type===t?"#388bfd":"#30363d",background:type===t?"#1f3a5f":"#0d1117",color:type===t?"#388bfd":"#8b949e",cursor:"pointer",fontWeight:600,fontSize:14}}>{l}</button>
        ))}
      </div>
      <input value={search} onChange={e=>{setSearch(e.target.value);setSid("");}} placeholder="🔍 חיפוש שם / מספר אישי..." style={S.input}/>
      {matched.length>0&&!sid&&(
        <div style={{background:"#0d1117",border:"1px solid #30363d",borderRadius:8,marginTop:-8,marginBottom:10,overflow:"hidden"}}>
          {matched.map(s=>(
            <div key={s.id} onClick={()=>{setSid(s.id);setSearch(s.name);}} style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #21262d",fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#1c2128"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <strong>{s.name}</strong> <span style={{color:"#8b949e"}}>{s.id} • פלוגה {s.unit}</span>
            </div>
          ))}
        </div>
      )}
      {soldier&&<div style={{background:"#0d1117",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13}}>✅ <strong>{soldier.name}</strong> • {Object.keys(assigned).length} פריטים</div>}
      {soldier&&type==="checkout"&&(
        <div>
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
              <select value={item.name} onChange={e=>{const n=[...items];n[i]={...n[i],name:e.target.value};setItems(n);}} style={{...S.input,marginBottom:0,flex:2}}>
                <option value="">— בחר אמצעי —</option>
                {EQ_COLS.map(eq=><option key={eq} value={eq}>{eq}{getMakat(eq)?" ("+getMakat(eq)+")":""}</option>)}
              </select>
              <SerialPicker itemName={item.name} value={item.serial} onChange={v=>{const n=[...items];n[i]={...n[i],serial:v};setItems(n);}} db={db}/>
              {items.length>1&&<button onClick={()=>setItems(p=>p.filter((_,x)=>x!==i))} style={{...S.btn("red"),padding:"8px"}}>✕</button>}
            </div>
          ))}
          <button onClick={()=>setItems(p=>[...p,{name:"",serial:""}])} style={{...S.btn(),fontSize:12,marginBottom:10}}>+ הוסף שורה</button>
          <button onClick={doCheckout} disabled={!items.some(i=>i.name)} style={{...S.btn("green"),width:"100%",padding:"11px 0",opacity:items.some(i=>i.name)?1:0.5}}>✅ שייך</button>
        </div>
      )}
      {soldier&&type==="return"&&(
        <div>
          {Object.keys(assigned).length===0?<p style={{color:"#8b949e",textAlign:"center",padding:16}}>אין אמצעים</p>:
          <>
            {Object.entries(assigned).map(([name,val])=>(
              <label key={name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:retSel.includes(name)?"#1a2f4a":"#0d1117",borderRadius:8,marginBottom:6,cursor:"pointer",border:`1px solid ${retSel.includes(name)?"#388bfd":"#21262d"}`}}>
                <input type="checkbox" checked={retSel.includes(name)} onChange={e=>setRetSel(p=>e.target.checked?[...p,name]:p.filter(x=>x!==name))}/>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>{name}</span>
                {isSerial(val)&&<span style={{color:"#8b949e",fontFamily:"monospace",fontSize:11}}>{val}</span>}
              </label>
            ))}
            <button onClick={doReturn} disabled={!retSel.length} style={{...S.btn("orange"),width:"100%",padding:"11px 0",marginTop:8,opacity:retSel.length?1:0.5}}>🔄 בטל שיוך ({retSel.length})</button>

      )}

  );
}

function GroupSignModal({db, soldiers, onClose}){
  const [groupName, setGroupName] = useState("");
  const [unit, setUnit] = useState("מסייעת");
  const [selectedIds, setSelectedIds] = useState([]);
  const [search, setSearch] = useState("");
  const [sigImg, setSigImg] = useState(null);
  const [showPad, setShowPad] = useState(false);
  const [done, setDone] = useState(false);

  const unitSoldiers = useMemo(()=>{
    const q=search.toLowerCase();
    return soldiers.filter(s=>s.unit===unit&&Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k)))
      .filter(s=>!q||s.name.toLowerCase().includes(q)||s.id.includes(q));
  },[soldiers,unit,search]);

  function toggleSoldier(id){
    setSelectedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  }
  function selectAll(){setSelectedIds(unitSoldiers.map(s=>s.id));}
  function clearAll(){setSelectedIds([]);}

  const selected = soldiers.filter(s=>selectedIds.includes(s.id));
  // Flatten all equipment from selected soldiers
  const allEquipment = [];
  selected.forEach(s=>{
    Object.entries(s.assigned||{}).forEach(([name,val])=>{
      allEquipment.push({soldierName:s.name,name,val});
    });
  });

  function doGroupSign(){
    if(!sigImg||selectedIds.length===0) return;
    const signedAt=todayStr()+" "+nowStr();
    const newSigs={...(db.signatures||{})};
    selectedIds.forEach(id=>{
      const s=soldiers.find(x=>x.id===id);
      if(s) newSigs[id]={sigData:sigImg,signedAt,groupSign:groupName||"שובר מרוכז"};
    });
    const ndb={...db,signatures:newSigs};
    saveDB(ndb);
    setDone(true);
  }

  const units=["א","ב","ג","מסייעת","אג\"מ","פלס\"מ"];

  return (
    <Modal title="✍️ שובר חתימה מרוכז" onClose={onClose} wide>
      {!done?(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={S.label}>שם השובר (אופציונלי)</label>
              <input value={groupName} onChange={e=>setGroupName(e.target.value)}
                placeholder="לדוגמה: שובר מסייעת מרץ" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>פלוגה</label>
              <select value={unit} onChange={e=>{setUnit(e.target.value);setSelectedIds([]);}} style={S.input}>
                {units.map(u=><option key={u} value={u}>{u}</option>)}
              </select>
            </div>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש בפלוגה..." style={{...S.input,flex:1,marginBottom:0}}/>
            <button onClick={selectAll} style={{...S.btn("blue"),padding:"7px 12px",fontSize:12,flexShrink:0}}>בחר הכל</button>
            <button onClick={clearAll} style={{...S.btn("red"),padding:"7px 12px",fontSize:12,flexShrink:0}}>נקה</button>
          </div>

          <div style={{background:"#0d1117",borderRadius:8,maxHeight:220,overflowY:"auto",marginBottom:14,border:"1px solid #21262d"}}>
            {unitSoldiers.length===0
              ?<div style={{padding:16,textAlign:"center",color:"#8b949e",fontSize:13}}>אין חיילים עם נשק בפלוגה זו</div>
              :unitSoldiers.map(s=>{
                const sel=selectedIds.includes(s.id);
                const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
                return (
                  <label key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid #161b22",background:sel?"#1a2f4a":"transparent"}}>
                    <input type="checkbox" checked={sel} onChange={()=>toggleSoldier(s.id)} style={{width:16,height:16}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{s.name} <span style={{color:"#484f58",fontSize:11}}>({s.id})</span></div>
                      <div style={{fontSize:11,color:"#8b949e"}}>{weps.map(([k])=>k).join(", ")}</div>
                    </div>
                    {db.signatures?.[s.id]&&<Badge color="green" small>✅</Badge>}
                  </label>
                );
              })
            }
          </div>

          {selectedIds.length>0&&(
            <div style={{...S.card,border:"1px solid #388bfd",marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#388bfd"}}>📋 סיכום שובר ({selectedIds.length} חיילים, {allEquipment.length} אמצעים)</div>
              <div style={{maxHeight:150,overflowY:"auto",fontSize:12}}>
                {selected.map(s=>(
                  <div key={s.id} style={{marginBottom:6}}>
                    <div style={{fontWeight:600,color:"#e6edf3"}}>{s.name}:</div>
                    <div style={{color:"#8b949e",paddingRight:12}}>
                      {Object.entries(s.assigned||{}).map(([n,v])=>`${n}${isSerial(v)?" ("+v+")":""}`).join(" • ")}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {selectedIds.length>0&&(
            <div>
              <label style={S.label}>חתימה אחת לכולם</label>
              {sigImg
                ?<div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
                  <img src={sigImg} style={{height:50,borderRadius:6,border:"1px solid #238636"}} alt="חתימה"/>
                  <button onClick={()=>{setSigImg(null);setShowPad(true);}} style={{...S.btn("orange"),fontSize:12}}>שנה</button>
                </div>
                :<button onClick={()=>setShowPad(true)} style={{...S.btn("orange"),width:"100%",padding:"11px 0",marginBottom:12}}>✍️ חתום כאן</button>
              }
              <button onClick={doGroupSign} disabled={!sigImg} style={{...S.btn("green"),width:"100%",padding:"13px 0",fontSize:15,opacity:sigImg?1:0.5}}>
                ✅ חתום על {selectedIds.length} חיילים
              </button>
            </div>
          )}
        </div>
      ):(
        <div style={{textAlign:"center",padding:20}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h3 style={{color:"#3fb950",fontSize:18,fontWeight:800,marginBottom:8}}>השובר נחתם!</h3>
          <p style={{color:"#8b949e",marginBottom:4}}>{selectedIds.length} חיילים חתמו במרוכז</p>
          <p style={{color:"#484f58",fontSize:12}}>{groupName||"שובר מרוכז"} • {todayStr()}</p>
          <button onClick={onClose} style={{...S.btn("green"),marginTop:16,padding:"10px 30px"}}>סגור</button>
        </div>
      )}
      {showPad&&<Modal title="חתימה מרוכזת" onClose={()=>setShowPad(false)}><SignaturePad onSave={d=>{setSigImg(d);setShowPad(false);}}/></Modal>}
    </Modal>
  );
}

function BrokenEquipmentTab({db, setDb, soldiers, auth}){

  // sync from db
  useEffect(()=>setItems(db.brokenItems||[]),[db.brokenItems]);

  function setF(k,v){setForm(p=>({...p,[k]:v}));}

  function addItem(){
    if(!form.itemName.trim()){return;}
    const newItem={
      id:Date.now()+"",
      soldierId:form.soldierId,
      soldierName:soldiers.find(s=>s.id===form.soldierId)?.name||"—",
      itemName:form.itemName.trim(),
      serial:form.serial.trim(),
      note:form.note.trim(),
      severity:form.severity,
      reportedAt:todayStr()+" "+nowStr(),
      reportedBy:auth.name,
      status:"פתוח",
    };
    const updated=[newItem,...items];
    const ndb={...db, brokenItems:updated};
    saveDB(ndb); setDb(ndb); setItems(updated);
    setForm({soldierSearch:"",soldierId:"",itemName:"",serial:"",note:"",severity:"בינוני"});
    setShowForm(false);

              borderColor:filterSev===s?"#e3b341":"#30363d",background:filterSev===s?"#3d2a1a":"#0d1117",
              color:filterSev===s?"#e3b341":"#8b949e"}}>{s}</button>

      </div>

      {shown.length===0

}

function ManagerApp({auth,onLogout}){
  const [db,setDb]=useState(()=>initDB());
  const [tab,setTab]=useState("dashboard");

  // האזנה ל-Firebase בזמן אמת
  useEffect(()=>{
    const off1 = fbOn("db/signatures", (sigs)=>{
      setDb(prev=>{
        const updated={...prev, signatures: cleanSigs(sigs)};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off2 = fbOn("db/assignments", (assignments)=>{
      setDb(prev=>{
        const updated={...prev, assignments: assignments||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off3 = fbOn("db/customSoldiers", (custom)=>{
      setDb(prev=>{
        const updated={...prev, customSoldiers: custom||{}};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off4 = fbOn("db/brokenItems", (broken)=>{
      setDb(prev=>{
        const updated={...prev, brokenItems: broken||[]};
        try{localStorage.setItem(DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      });
    });
    const off5 = fbOn("db/bulkGuarantors", (guarantors)=>{
      setDb(prev=>({...prev, bulkGuarantors: guarantors||{}}));
    });
    return ()=>{ off1(); off2(); off3(); off4(); off5(); };
  },[]);
  const [search,setSearch]=useState("");
  const [filterUnit,setFilterUnit]=useState("הכל");
  const [selSoldier,setSelSoldier]=useState(null);
  const [dailyType,setDailyType]=useState(null);
  const [quickModal,setQuickModal]=useState(false);

  const [mobileMenu,setMobileMenu]=useState(false);
  const [addModal,setAddModal]=useState(false);

  const units=useMemo(()=>["הכל",...[...new Set(RAW_SOLDIERS.map(s=>s.unit).filter(Boolean))].sort()],[]);
  const soldiers=useMemo(()=>{
    const assignments = db.assignments||{};
    const signatures = db.signatures||{};
    const customSoldiers = db.customSoldiers||{};
    const custom=Object.values(customSoldiers);
    const base=RAW_SOLDIERS.filter(s=>!customSoldiers[s.id]);
    const guarantors=db.bulkGuarantors||{};
    return [...custom,...base].map(s=>{
      const guarantee=Object.values(guarantors).find(g=>g.remaining&&g.remaining[s.id]);
      return {...s,assigned:assignments[s.id]??s.assigned,signature:signatures[s.id]?.sigData||null,signedAt:signatures[s.id]?.signedAt||null,guarantee:guarantee||null};
    });
  },[db]);
  const filtered=useMemo(()=>{let l=soldiers;if(filterUnit!=="הכל")l=l.filter(s=>s.unit===filterUnit);if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)||(s.squad||"").toLowerCase().includes(q));}return l;},[soldiers,filterUnit,search]);

  const withWeapons=useMemo(()=>soldiers.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k))).length,[soldiers]);
  const signedCount=useMemo(()=>soldiers.filter(s=>s.signature).length,[soldiers]);
  const unsigned=withWeapons-signedCount;

  function sendWhatsApp(soldier){
    const phone=phoneToWA(soldier.phone);
    if(!phone){alert("אין מספר טלפון לחייל זה");return;}
    const link="https://beautiful-churros-3219f5.netlify.app";
    const assigned=soldier.assigned||{};
    const compactData={};
    Object.entries(assigned).forEach(([name,val])=>{
      const idx=EQ_COLS.indexOf(name);
      if(idx>=0) compactData[idx]=val;
    });
    // שימוש ב-btoa לקידוד קצר וללא תווים בעייתיים
    const encoded=btoa(JSON.stringify(compactData));
    const signLink=link+"?sign="+soldier.id+"&b="+encoded;
    const msg=`שלום ${soldier.name},\nנא לחתום על טופס ההחתמה האישי:\n${signLink}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
  }

      {bulkModal&&<BulkSignModal db={db} onSave={setDb} onClose={()=>setBulkModal(false)} soldiers={soldiers} auth={auth}/>}

  );
}

function ViewerApp({auth, onLogout, db}){
  const [search,setSearch]=React.useState("");
  const [filterUnit,setFilterUnit]=React.useState(auth.viewUnit&&auth.viewUnit!=="הכל"?auth.viewUnit:"הכל");
  const units=["הכל",...[...new Set(RAW_SOLDIERS.map(s=>s.unit))].sort()];
  const soldiers=React.useMemo(()=>{
    const custom=Object.values(db.customSoldiers||{});
    const all=[...custom,...RAW_SOLDIERS];
    return all.map(s=>{
      const assigned=db.assignments?.[s.id]!==undefined?db.assignments[s.id]:s.assigned||{};
      const sig=db.signatures?.[s.id];
      return {...s,assigned,signature:!!sig};
    });
  },[db]);

  const filtered=React.useMemo(()=>{
    let l=soldiers;
    if(auth.viewUnit&&auth.viewUnit!=="הכל") l=l.filter(s=>s.unit===auth.viewUnit);
    else if(filterUnit!=="הכל") l=l.filter(s=>s.unit===filterUnit);
    if(search.trim()){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q));}
    return l;
  },[soldiers,filterUnit,search,auth.viewUnit]);

  const signed=filtered.filter(s=>s.signature).length;
  const withWeapon=filtered.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k))).length;

  return (
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#e6edf3",padding:16,fontFamily:"system-ui,sans-serif",direction:"rtl"}}>
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:800}}>👁️ מצב חתימות{auth.viewUnit&&auth.viewUnit!=="הכל"?` — פלוגה ${auth.viewUnit}`:""}</h1>
            <div style={{color:"#8b949e",fontSize:12,marginTop:2}}>{auth.name}</div>
          </div>
          <button onClick={onLogout} style={{...S.btn(),fontSize:12}}>🚪 יציאה</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {[
            {l:'סה"כ בסינון',v:filtered.length,c:"#388bfd"},
            {l:"חתומים",v:signed,c:"#3fb950"},
            {l:"ממתינים",v:withWeapon-signed,c:"#e3b341"},
          ].map(s=>(
            <div key={s.l} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{color:"#8b949e",fontSize:12,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש..." style={{...S.input,flex:1,minWidth:160,marginBottom:0}}/>
          {(!auth.viewUnit||auth.viewUnit==="הכל")&&(
            <select value={filterUnit} onChange={e=>setFilterUnit(e.target.value)} style={{...S.input,width:"auto",marginBottom:0}}>
              {units.map(u=><option key={u} value={u}>{u==="הכל"?"כל הפלוגות":"פלוגה "+u}</option>)}
            </select>
          )}
        </div>

        <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
              <thead><tr style={{background:"#0d1117"}}>
                {["מ. אישי","שם","פלוגה","נשק","סטטוס","חתם ב-"].map(h=><th key={h} style={S.th}>{h}</th>)}
              </tr></thead>
              <tbody>
                {filtered.map(s=>{
                  const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
                  const sig=db.signatures?.[s.id];
                  return (
                    <tr key={s.id} style={{background:"#161b22"}}>
                      <td style={{...S.td,color:"#8b949e",fontFamily:"monospace",fontSize:12}}>{s.id}</td>
                      <td style={{...S.td,fontWeight:600}}>{s.name}</td>
                      <td style={S.td}><Badge color="purple" small>{s.unit}</Badge></td>
                      <td style={{...S.td,fontSize:12,color:"#8b949e"}}>{weps.length>0?weps.map(([k])=>k).join(", "):"—"}</td>
                      <td style={S.td}>
                        {sig?<Badge color="green" small>✅ חתום</Badge>:weps.length>0?<Badge color="orange" small>⏳ ממתין</Badge>:<Badge color="gray" small>אין נשק</Badge>}
                      </td>
                      <td style={{...S.td,fontSize:11,color:"#3fb950"}}>{sig?.signedAt||"—"}</td>
                    </tr>
                  );
                })}
                {filtered.length===0&&<tr><td colSpan={6} style={{...S.td,textAlign:"center",color:"#8b949e",padding:24}}>אין תוצאות</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function downloadBulkForm(repName, repId, unit, soldiers, sigData, db){
  const dateStr = todayStr();
  const unitLabel = unit==="הכל" ? "כל הגדוד" : "פלוגה "+unit;

  // סכם כמויות לפי אמצעי
  const itemMap = {}; // {name: {qty, serials: [], makat}}
  soldiers.forEach(s => {
    const assigned = db.assignments?.[s.id] ?? s.assigned ?? {};
    Object.entries(assigned).forEach(([name, serial]) => {
      if(!itemMap[name]) itemMap[name] = {qty:0, serials:[], makat: NAME_TO_MAKAT[name]||""};
      itemMap[name].qty++;
      if(serial && serial!==1 && serial!==true) itemMap[name].serials.push(String(serial));
    });
  });

  // מיין — קודם נשק, אחר כך אביזרים
  const weaponItems = Object.entries(itemMap).filter(([k])=>WEAPON_KEYS.includes(k));
  const accessoryItems = Object.entries(itemMap).filter(([k])=>!WEAPON_KEYS.includes(k));
  const allItems = [...weaponItems, ...accessoryItems];

  let rows = "";
  let totalQty = 0;
  allItems.forEach(([name, data], i) => {
    totalQty += data.qty;
    const serialsText = data.serials.length > 0 ? data.serials.join(", ") : "—";
    const isWeapon = WEAPON_KEYS.includes(name);
    rows += `<tr>
      <td style="text-align:center">${i+1}</td>
      <td style="${isWeapon?"font-weight:bold":""}">${name}</td>
      <td style="text-align:center;font-family:monospace;font-size:11px">${data.makat||"—"}</td>
      <td style="text-align:center;font-weight:bold;font-size:15px">${data.qty}</td>
      <td style="font-size:11px;color:#555">${serialsText}</td>

  thead tr{background:#1a1a2e;color:#fff}
  thead th{padding:8px 7px;text-align:right;font-size:12px}
  tbody tr:nth-child(even){background:#f9f9f9}
  tbody td{border:1px solid #ddd;padding:6px 7px}

// =================== BULK SIGN MODAL (פיצר 2 - דיטור) ===================
function BulkSignModal({db, onSave, onClose, soldiers, auth}){
  const [repSearch,setRepSearch]=React.useState("");
  const [repId,setRepId]=React.useState("");
  const [selectedUnit,setSelectedUnit]=React.useState("הכל");
  const [repSuggestions,setRepSuggestions]=React.useState([]);
  const [sigData,setSigData]=React.useState(null);
  const [showPad,setShowPad]=React.useState(false);
  const [step,setStep]=React.useState("select"); // select, sign, done

  const units=["הכל",...[...new Set(soldiers.map(s=>s.unit))].sort()];
  const targetSoldiers=React.useMemo(()=>{
    let l=soldiers.filter(s=>{
      const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
      return weps.length>0 && !db.signatures?.[s.id];
    });
    if(selectedUnit!=="הכל") l=l.filter(s=>s.unit===selectedUnit);
    return l;
  },[soldiers,db.signatures,selectedUnit]);

  function onRepSearch(v){
    setRepSearch(v);setRepId("");
    if(!v.trim()){setRepSuggestions([]);return;}
    const q=v.toLowerCase();
    setRepSuggestions(soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6));
  }

  function doSign(sig){
    setSigData(sig);setShowPad(false);setStep("done");
    const signedAt=todayStr()+" "+nowStr();
    const guarantorKey=repId||("bulk_"+Date.now());
    // המר מערכים לאובייקטים (Firebase לא אוהב מערכים)
    const soldiersObj={}; targetSoldiers.forEach(s=>{soldiersObj[s.id]=true;});
    const remainingObj={}; targetSoldiers.forEach(s=>{remainingObj[s.id]=true;});
    const newGuarantors={...(db.bulkGuarantors||{})};
    newGuarantors[guarantorKey]={
      repId,repName:repSearch,sigData:sig,signedAt,
      unit:selectedUnit,
      soldiers:soldiersObj,
      remaining:remainingObj,
    };
    const ndb={...db,bulkGuarantors:newGuarantors};
    onSave(ndb);
  }

  return (
    <Modal title="✍️ החתמה מרוכזת" onClose={onClose} wide>
      {step==="select"&&(
        <div>
          <div style={{background:"#1a2a1a",border:"1px solid #238636",borderRadius:8,padding:12,marginBottom:16,fontSize:13,color:"#3fb950"}}>
            🪖 פיצר זה מאפשר לאדם אחד (כגון אביאל דיטור) לחתום על כל ציוד הפלוגה בחתימה אחת
          </div>

          <label style={S.label}>בחר פלוגה להחתים</label>
          <select value={selectedUnit} onChange={e=>setSelectedUnit(e.target.value)} style={{...S.input}}>
            {units.map(u=><option key={u} value={u}>{u==="הכל"?"כל הפלוגות":"פלוגה "+u}</option>)}
          </select>

          <label style={S.label}>שם החותם (נציג / אחראי)</label>
          <div style={{position:"relative"}}>
            <input value={repSearch} onChange={e=>onRepSearch(e.target.value)} placeholder="הקלד שם..." style={S.input}/>
            {repSuggestions.length>0&&(
              <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#161b22",border:"1px solid #30363d",borderRadius:8,zIndex:100}}>
                {repSuggestions.map(s=>(
                  <div key={s.id} onClick={()=>{setRepSearch(s.name);setRepId(s.id);setRepSuggestions([]);}}
                    style={{padding:"8px 12px",cursor:"pointer",color:"#e6edf3",fontSize:13}}>
                    {s.name} <span style={{color:"#8b949e",fontSize:11}}>({s.id})</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{background:"#0d1117",borderRadius:8,padding:12,marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>⚠️ חיילים שיחתמו ({targetSoldiers.length})</div>
            {targetSoldiers.length===0
              ?<div style={{color:"#8b949e",fontSize:13}}>אין חיילים ממתינים בפלוגה זו</div>
              :<div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                {targetSoldiers.map(s=>(
                  <div key={s.id} style={{fontSize:12,color:"#e6edf3",display:"flex",justifyContent:"space-between"}}>
                    <span>{s.name}</span>
                    <span style={{color:"#8b949e"}}>{Object.keys(s.assigned).filter(k=>WEAPON_KEYS.includes(k)).join(", ")}</span>
                  </div>
                ))}
              </div>
            }
          </div>

          <button onClick={()=>setStep("sign")} disabled={targetSoldiers.length===0||!repSearch.trim()}
            style={{...S.btn("green"),width:"100%",padding:"12px 0",fontSize:15,opacity:targetSoldiers.length===0||!repSearch.trim()?0.5:1}}>
            → המשך לחתימה ({targetSoldiers.length} חיילים)
          </button>
        </div>
      )}
      {step==="sign"&&(
        <div>
          <div style={{...S.card,marginBottom:16,background:"#0d1117"}}>
            <div style={{fontWeight:700,marginBottom:4}}>נציג: {repSearch}</div>
            <div style={{color:"#8b949e",fontSize:13}}>חותם על {targetSoldiers.length} חיילים מ{selectedUnit==="הכל"?"כל הפלוגות":"פלוגה "+selectedUnit}</div>
          </div>
          {!sigData
            ?<div>
              <p style={{color:"#8b949e",fontSize:13,marginBottom:12}}>חתום כאן לאישור קבלת כל האמצעים ברשימה</p>
              <SignaturePad onSave={doSign}/>
              <button onClick={()=>setStep("select")} style={{...S.btn(),width:"100%",marginTop:8}}>← חזור</button>
            </div>
            :<div style={{textAlign:"center"}}><div style={{fontSize:48}}>✅</div><div style={{color:"#3fb950",fontWeight:700}}>נחתם!</div></div>
          }
        </div>
      )}
      {step==="done"&&(
        <div style={{textAlign:"center",padding:24}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h2 style={{color:"#3fb950",marginBottom:8}}>החתימה המרוכזת התקבלה!</h2>
          <p style={{color:"#8b949e",fontSize:13,marginBottom:20}}>{targetSoldiers.length} חיילים סומנו כחתומים בשם {repSearch}</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>downloadBulkForm(repSearch,repId,selectedUnit,targetSoldiers,sigData,db)} style={{...S.btn("purple"),padding:"10px 20px",fontSize:14}}>⬇️ הורד שובר מרוכז</button>
            <button onClick={onClose} style={{...S.btn("green"),padding:"10px 20px",fontSize:14}}>סגור</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

function App(){
  const [auth,setAuth]=useState(()=>{
    // בדוק אם יש פרמטר ?sign= בURL
    const params=new URLSearchParams(window.location.search);
    const signId=params.get("sign");
    if(signId){
      const s=RAW_SOLDIERS.find(x=>x.id===signId);
      let assignedFromLink={};
      const bParam=params.get("b");
      const dParam=params.get("d");
      const rawParam=bParam||dParam;
      if(rawParam){try{
        const decoded=bParam?atob(bParam):decodeURIComponent(rawParam);
        const compact=JSON.parse(decoded);
        Object.entries(compact).forEach(([k,v])=>{
          const idx=parseInt(k);
          if(!isNaN(idx)&&EQ_COLS[idx]) assignedFromLink[EQ_COLS[idx]]=v;
          else assignedFromLink[k]=v;
        });
      }catch(e){}}
      if(s) return{role:"soldier",name:s.name,soldierId:signId,autoSign:true,assignedFromLink};
      return{role:"soldier",name:"חייל",soldierId:signId,autoSign:true,assignedFromLink};
    }
    // שחזר session שמור
    try{
      const saved=sessionStorage.getItem("armory_session");
      if(saved) return JSON.parse(saved);
    }catch(e){}
    return null;
  });

  function handleLogin(a){
    try{sessionStorage.setItem("armory_session",JSON.stringify(a));}catch(e){}
    setAuth(a);
  }
  function handleLogout(){
    try{sessionStorage.removeItem("armory_session");}catch(e){}
    setAuth(null);
  }

  const [db,setDb]=useState(()=>initDB());
  if(!auth)return<Login onLogin={handleLogin}/>;
  if(auth.role==="soldier")return<SoldierSignView auth={auth} onLogout={handleLogout} db={db} setDb={setDb}/>;
  if(auth.role==="viewer")return<ViewerApp auth={auth} onLogout={handleLogout} db={db}/>;
  return<ManagerApp auth={auth} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
