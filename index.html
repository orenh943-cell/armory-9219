// =================== INVENTORY TAB (מלאי גדודי/פלוגתי) ===================
const UNIT_LIST = ["פנוי","א","ב","ג","מסייעת","אגמ","פלסמ","גדודי","נעורה","חטיבה 6"];

function InventoryTab({db, setDb, soldiers}){
  const [view, setView] = React.useState("list"); // list | add | transfer
  const [filterUnit, setFilterUnit] = React.useState("הכל");
  const [filterName, setFilterName] = React.useState("");
  const [showTransfer, setShowTransfer] = React.useState(null); // item id
  const [showAssignSoldier, setShowAssignSoldier] = React.useState(null); // item id

  // unitItems: {id: {name, serial, unit, addedAt, note}}
  const items = Object.entries(db.unitItems||{});

  const filtered = React.useMemo(()=>{
    return items.filter(([,item])=>{
      const unitMatch = filterUnit==="הכל" || item.unit===filterUnit;
      const nameMatch = !filterName || item.name.includes(filterName) || String(item.serial||"").includes(filterName);
      return unitMatch && nameMatch;
    });
  },[items, filterUnit, filterName]);

  // סטטיסטיקות
  const stats = React.useMemo(()=>{
    const byUnit = {};
    UNIT_LIST.forEach(u=>byUnit[u]=0);
    items.forEach(([,item])=>{ byUnit[item.unit]=(byUnit[item.unit]||0)+1; });
    return byUnit;
  },[items]);

  function deleteItem(id){
    if(!window.confirm("למחוק פריט זה מהמלאי?")) return;
    const newItems={...db.unitItems}; delete newItems[id];
    const ndb={...db,unitItems:newItems}; saveDB(ndb); setDb(ndb);
  }

  function transferItem(id, newUnit){
    const newItems={...db.unitItems,[id]:{...db.unitItems[id],unit:newUnit,movedAt:new Date().toLocaleDateString("he-IL")}};
    const ndb={...db,unitItems:newItems}; saveDB(ndb); setDb(ndb);
    setShowTransfer(null);
  }

  function assignToSoldier(id, soldierId){
    const item = db.unitItems[id];
    if(!item||!soldierId) return;
    const soldier = soldiers.find(s=>s.id===soldierId);
    if(!soldier) return;
    const assigned = db.assignments?.[soldierId]!==undefined ? db.assignments[soldierId] : soldier.assigned||{};
    const newAssigned = {...assigned, [item.name]: item.serial||1};
    // הסר מהמלאי הגדודי
    const newUnitItems={...db.unitItems}; delete newUnitItems[id];
    const newDb={...db,
      assignments:{...(db.assignments||{}),[soldierId]:newAssigned},
      signatures:{...(db.signatures||{})},
      unitItems:newUnitItems
    };
    delete newDb.signatures[soldierId];
    saveDB(newDb); setDb(newDb);
    setShowAssignSoldier(null);
  }

  function downloadReport(){
    // Excel via CSV with BOM for Hebrew
    const BOM = "\uFEFF";
    const header = "שם אמצעי,מספר סידורי,מיקום,תאריך הוספה,הערה\n";
    const rows = filtered.map(([id,item])=>{
      const unit = item.unit==="פנוי"?"פנוי":item.unit==="גדודי"?"גדודי":"פלוגה "+item.unit;
      return `"${item.name}","${item.serial||"—"}","${unit}","${item.addedAt||""}","${item.note||""}"`;
    }).join("\n");
    const csv = BOM + header + rows;
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download=`מלאי_גדודי_${new Date().toLocaleDateString("he-IL").replace(/\//g,"-")}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }

  return (
    <div style={{maxWidth:800,margin:"0 auto",padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:17,fontWeight:800,margin:0}}>📦 מלאי גדודי / פלוגתי</h2>
        <div style={{display:"flex",gap:8}}>
          <button onClick={downloadReport} style={{...S.btn("purple"),padding:"7px 12px",fontSize:12}}>⬇️ הורד דוח Excel</button>
          <button onClick={()=>setView(view==="add"?"list":"add")} style={{...S.btn("green"),padding:"7px 12px",fontSize:12}}>
            {view==="add"?"✕ ביטול":"➕ הוסף פריט"}
          </button>
        </div>
      </div>

      {/* סטטיסטיקות */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))",gap:8,marginBottom:16}}>
        {[["הכל","כולם","#a371f7"],...UNIT_LIST.map(u=>[u,
        u==="פנוי"?"🟢 פנוי":
        u==="גדודי"?"🎖️ גדודי":
        u==="נעורה"?"📦 נעורה":
        u==="חטיבה 6"?"🔺 חטיבה":
        "פלוגה "+u,
        u==="פנוי"?"#3fb950":u==="גדודי"?"#e3b341":u==="נעורה"?"#8b949e":"#388bfd"
      ])].map(([u,label,c])=>(
          <div key={u} onClick={()=>setFilterUnit(u)}
            style={{...S.card,textAlign:"center",padding:"10px 6px",marginBottom:0,cursor:"pointer",
              border:`1px solid ${filterUnit===u?c:"#30363d"}`,background:filterUnit===u?"#161b22":"#0d1117"}}>
            <div style={{fontSize:18,fontWeight:800,color:c}}>{u==="הכל"?items.length:(stats[u]||0)}</div>
            <div style={{fontSize:10,color:"#8b949e",marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>

      {/* טופס הוספה */}
      {view==="add"&&<AddUnitItemForm db={db} setDb={setDb} onDone={()=>setView("list")}/>}

      {/* חיפוש */}
      <input value={filterName} onChange={e=>setFilterName(e.target.value)}
        placeholder="🔍 חפש לפי שם אמצעי או מספר סידורי..."
        style={{...S.input,marginBottom:12}}/>

      {/* רשימה */}
      <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>{filtered.length} פריטים</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(([id,item])=>{
          const isAvail = item.unit==="פנוי";
          return (
            <div key={id} style={{background:"#161b22",borderRadius:9,padding:"10px 14px",border:`1px solid ${isAvail?"#238636":"#30363d"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <div style={{flex:1}}>
                  <span style={{fontWeight:700,fontSize:14,color:WEAPON_KEYS.includes(item.name)?"#e6edf3":"#388bfd"}}>{item.name}</span>
                  {item.serial&&<span style={{color:"#8b949e",fontFamily:"monospace",fontSize:12,marginRight:8}}>· {item.serial}</span>}
                  {item.note&&<span style={{color:"#484f58",fontSize:11,marginRight:6}}>— {item.note}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                  <Badge color={isAvail?"green":item.unit==="גדודי"?"orange":item.unit==="נעורה"?"gray":"blue"} small>
                    {isAvail?"🟢 פנוי":item.unit==="גדודי"?"🎖️ גדודי":item.unit==="נעורה"?"📦 נעורה":"פלוגה "+item.unit}
                  </Badge>
                  <span title="מוקצה לפלוגה — לא לחייל ספציפי" style={{width:12,height:12,borderRadius:2,background:"#e3b341",display:"inline-block",flexShrink:0}}/>
                  <button onClick={()=>setShowTransfer(showTransfer===id?null:id)}
                    style={{...S.btn("orange"),padding:"3px 8px",fontSize:11}}>🔄 העבר</button>
                  <button onClick={()=>setShowAssignSoldier(showAssignSoldier===id?null:id)}
                    style={{...S.btn("blue"),padding:"3px 8px",fontSize:11}}>👤 לחייל</button>
                  <button onClick={()=>deleteItem(id)}
                    style={{...S.btn("red"),padding:"3px 8px",fontSize:11}}>✕</button>
                </div>
              </div>
              <div style={{fontSize:10,color:"#484f58",marginTop:4}}>הוסף: {item.addedAt||"—"}{item.movedAt?" • הועבר: "+item.movedAt:""}</div>

              {/* העברה לפלוגה */}
              {showTransfer===id&&(
                <div style={{marginTop:10,padding:"10px",background:"#0d1117",borderRadius:7,border:"1px solid #30363d"}}>
                  <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>העבר לפלוגה / סמן כפנוי:</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {UNIT_LIST.map(u=>(
                      <button key={u} onClick={()=>transferItem(id,u)}
                        style={{...S.btn(item.unit===u?"green":""),padding:"5px 10px",fontSize:12,
                          border:`1px solid ${item.unit===u?"#238636":"#30363d"}`}}>
                        {u==="פנוי"?"🟢 פנוי":u==="גדודי"?"🎖️ גדודי":u==="נעורה"?"📦 נעורה":"פלוגה "+u}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* שיוך לחייל */}
              {showAssignSoldier===id&&(
                <AssignToSoldierPanel item={item} itemId={id} soldiers={soldiers} db={db}
                  onAssign={(solId)=>assignToSoldier(id,solId)} onClose={()=>setShowAssignSoldier(null)}/>
              )}
            </div>
          );
        })}
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:32,color:"#484f58"}}>
            <div style={{fontSize:40,marginBottom:8}}>📦</div>
            <div>אין פריטים {filterUnit!=="הכל"?`בפלוגה ${filterUnit}`:""}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function AddUnitItemForm({db, setDb, onDone}){
  const [name, setName] = React.useState("");
  const [serial, setSerial] = React.useState("");
  const [unit, setUnit] = React.useState("פנוי");
  const [note, setNote] = React.useState("");
  const [err, setErr] = React.useState("");

  function save(){
    if(!name.trim()){setErr("חובה לבחור אמצעי");return;}
    const id = "ui_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    const newItem = {name:name.trim(), serial:serial.trim()||null, unit, note:note.trim()||null, addedAt:new Date().toLocaleDateString("he-IL")};
    const ndb={...db, unitItems:{...(db.unitItems||{}), [id]:newItem}};
    saveDB(ndb); setDb(ndb);
    setName(""); setSerial(""); setNote(""); setErr("");
    onDone();
  }

  return (
    <div style={{background:"#161b22",border:"1px solid #238636",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,color:"#3fb950",marginBottom:12}}>➕ הוספת פריט למלאי</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div>
          <label style={S.label}>אמצעי</label>
          <select value={name} onChange={e=>setName(e.target.value)} style={S.input}>
            <option value="">— בחר אמצעי —</option>
            {EQ_COLS.map(eq=><option key={eq} value={eq}>{eq}{getMakat(eq)?" ("+getMakat(eq)+")":""}</option>)}
          </select>
        </div>
        <div>
          <label style={S.label}>מספר סידורי</label>
          <SerialPicker itemName={name} value={serial} onChange={setSerial} db={db}/>
        </div>
        <div>
          <label style={S.label}>שיוך</label>
          <select value={unit} onChange={e=>setUnit(e.target.value)} style={S.input}>
            {UNIT_LIST.map(u=><option key={u} value={u}>{u==="פנוי"?"🟢 פנוי — נשקייה":"פלוגה "+u}</option>)}
          </select>
        </div>
        <div>
          <label style={S.label}>הערה (אופציונלי)</label>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="לדוגמא: לתיקון" style={S.input}/>
        </div>
      </div>
      {err&&<div style={{color:"#f85149",fontSize:12,marginBottom:8}}>{err}</div>}
      <button onClick={save} style={{...S.btn("green"),width:"100%",padding:"10px 0"}}>✅ הוסף למלאי</button>
    </div>
  );
}

function AssignToSoldierPanel({item, itemId, soldiers, db, onAssign, onClose}){
  const [search, setSearch] = React.useState("");
  const matched = React.useMemo(()=>{
    if(!search.trim()) return [];
    const q=search.toLowerCase();
    return soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6);
  },[search,soldiers]);

  return (
    <div style={{marginTop:10,padding:"10px",background:"#0d1117",borderRadius:7,border:"1px solid #388bfd"}}>
      <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>העבר {item.name} לחייל:</div>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="חפש שם / מ.א..." style={{...S.input,marginBottom:6}}/>
      {matched.map(s=>(
        <div key={s.id} onClick={()=>onAssign(s.id)}
          style={{padding:"8px 10px",background:"#161b22",borderRadius:6,marginBottom:4,cursor:"pointer",
            display:"flex",justifyContent:"space-between",alignItems:"center"}}
          onMouseEnter={e=>e.currentTarget.style.background="#1f3a5f"}
          onMouseLeave={e=>e.currentTarget.style.background="#161b22"}>
          <span style={{fontWeight:600}}>{s.name}</span>
          <span style={{fontSize:11,color:"#8b949e"}}>פלוגה {s.unit} · {s.id}</span>
        </div>
      ))}
      {search&&matched.length===0&&<div style={{color:"#484f58",fontSize:12}}>לא נמצא</div>}
      <button onClick={onClose} style={{...S.btn(),width:"100%",marginTop:6,fontSize:11}}>ביטול</button>
    </div>
  );
}

// =================== DASH DETAIL MODAL ===================
function DashDetailModal({type, soldiers, db, onClose}){
  const [unitFilter, setUnitFilter] = React.useState("הכל");
  const units = ["הכל",...[...new Set(soldiers.map(s=>s.unit))].sort()];

  const filtered = React.useMemo(()=>{
    let list = soldiers;
    if(type==="signed") list=list.filter(s=>!!db.signatures?.[s.id]);
    else if(type==="unsigned") list=list.filter(s=>{
      const hasWeapon=Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k));
      return hasWeapon && !db.signatures?.[s.id];
    });
    else if(type==="withWeapon") list=list.filter(s=>Object.keys(s.assigned||{}).some(k=>WEAPON_KEYS.includes(k)));
    if(unitFilter!=="הכל") list=list.filter(s=>s.unit===unitFilter);
    return list;
  },[type, soldiers, db, unitFilter]);

  const TITLES = {signed:"✅ חיילים חתומים", unsigned:"⏳ טרם חתמו", withWeapon:"🔫 חיילים עם נשק", all:"🪖 כל החיילים"};

  return (
    <Modal title={TITLES[type]||"פירוט"} onClose={onClose}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {units.map(u=>(
          <button key={u} onClick={()=>setUnitFilter(u)}
            style={{...S.btn(unitFilter===u?"blue":""),padding:"4px 10px",fontSize:12}}>
            {u==="הכל"?"כולם":"פלוגה "+u}
          </button>
        ))}
      </div>
      <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>{filtered.length} חיילים</div>
      <div style={{maxHeight:420,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(s=>{
          const hasSig=!!db.signatures?.[s.id];
          const items=Object.entries(s.assigned||{});
          return (
            <div key={s.id} style={{background:"#0d1117",borderRadius:8,padding:"9px 12px",border:"1px solid #21262d"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontWeight:700,fontSize:13}}>{s.name}</div>
                <div style={{display:"flex",gap:5}}>
                  <Badge color={hasSig?"green":"orange"} small>{hasSig?"✅":"⏳"}</Badge>
                  <Badge color="purple" small>{s.unit}</Badge>
                </div>
              </div>
              <div style={{fontSize:11,color:"#484f58",marginBottom:items.length?4:0}}>מ.א: {s.id}</div>
              {items.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {items.map(([name,val])=>(
                    <span key={name} style={{background:"#161b22",borderRadius:4,padding:"2px 6px",fontSize:10,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>
                      {name}{isSerial(val)?" · "+val:""}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",padding:20,color:"#484f58"}}>אין חיילים בקטגוריה זו</div>}
      </div>
    </Modal>
  );
}

// =================== SEARCH MODAL (חיפוש צ / סידורי) ===================
function SearchModal({onClose, soldiers, db}){
  const [q, setQ] = React.useState("");
  const allSols = React.useMemo(()=>[...Object.values(db.customSoldiers||{}),...soldiers],[db,soldiers]);

  const results = React.useMemo(()=>{
    const t = q.trim();
    if(!t) return [];
    const isNum = /^\d+$/.test(t);
    if(isNum){
      // חיפוש לפי מספר אישי
      const byId = allSols.filter(s=>String(s.id).includes(t));
      // חיפוש לפי סידורי — אצל חיילים
      const bySerial = [];
      allSols.forEach(s=>{
        const assigned = db.assignments?.[s.id]!==undefined ? db.assignments[s.id] : s.assigned||{};
        Object.entries(assigned).forEach(([name,val])=>{
          if(val && String(val).includes(t) && isSerial(val)){
            bySerial.push({soldier:s, itemName:name, serial:val, source:"soldier"});
          }
        });
      });
      // חיפוש סידורי במלאי גדודי
      Object.values(db.unitItems||{}).forEach(item=>{
        if(item.serial && String(item.serial).includes(t)){
          bySerial.push({itemName:item.name, serial:item.serial, unit:item.unit, source:"inventory"});
        }
      });
      // חיפוש בכל ALL_SERIALS (כולל מה שלא מוקצה)
      ALL_SERIALS.forEach(s=>{
        const serialStr = String(s.serial);
        if(serialStr.includes(t) && !bySerial.some(r=>String(r.serial)===serialStr)){
          bySerial.push({itemName:s.name, serial:s.serial, unit:s.unit||"?", assignedToSoldier:s.assignedToSoldier, source:"registry"});
        }
      });
      return {byId, bySerial};
    } else {
      // חיפוש לפי שם
      const byName = allSols.filter(s=>s.name&&s.name.includes(t));
      return {byId:byName, bySerial:[]};
    }
  },[q, allSols, db]);

  const inp = React.useRef(null);
  React.useEffect(()=>{ setTimeout(()=>inp.current?.focus(),100); },[]);

  return (
    <Modal title="🔍 חיפוש צ׳ / מספר סידורי" onClose={onClose}>
      <input ref={inp} value={q} onChange={e=>setQ(e.target.value)}
        placeholder="הקלד מספר אישי, מספר סידורי, או שם..."
        style={{...S.input,width:"100%",fontSize:15,marginBottom:16}}/>
      {q.trim()&&(
        <div>
          {results.byId?.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#8b949e",marginBottom:6}}>👤 חיילים ({results.byId.length})</div>
              {results.byId.map(s=>{
                const assigned = db.assignments?.[s.id]!==undefined ? db.assignments[s.id] : s.assigned||{};
                const items = Object.entries(assigned);
                const hasSig = !!db.signatures?.[s.id];
                return (
                  <div key={s.id} style={{background:"#0d1117",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #21262d"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <Badge color={hasSig?"green":"orange"} small>{hasSig?"✅ חתום":"⏳ לא חתום"}</Badge>
                        <Badge color="purple" small>פלוגה {s.unit}</Badge>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"#484f58",marginBottom:6}}>מ.א: {s.id}</div>
                    {items.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {items.map(([name,val])=>(
                          <span key={name} style={{background:"#161b22",borderRadius:4,padding:"2px 7px",fontSize:11,color:WEAPON_KEYS.includes(name)?"#e6edf3":"#388bfd"}}>
                            {name}{isSerial(val)?" · "+val:""}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {results.bySerial?.length>0&&(
            <div>
              <div style={{fontSize:12,color:"#8b949e",marginBottom:6}}>🔢 מספרים סידוריים ({results.bySerial.length})</div>
              {results.bySerial.map((r,i)=>(
                <div key={i} style={{background:"#0d1117",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #21262d"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    <div>
                      <span style={{fontWeight:700,fontSize:14,color:WEAPON_KEYS.includes(r.itemName)?"#e6edf3":"#388bfd"}}>{r.itemName}</span>
                      <span style={{color:"#8b949e",fontFamily:"monospace",fontSize:12,marginRight:8}}>· {r.serial}</span>
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      {r.source==="soldier"&&<Badge color="blue" small>👤 {r.soldier?.name}</Badge>}
                      {r.source==="inventory"&&<Badge color="green" small>📦 מלאי</Badge>}
                      {r.source==="registry"&&<Badge color={r.assignedToSoldier?"blue":"orange"} small>{r.assignedToSoldier?"✅ מוקצה לחייל":"📋 רישום גדודי"}</Badge>}
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#484f58",marginTop:4}}>
                    {r.source==="soldier"&&`פלוגה ${r.soldier?.unit} · מ.א ${r.soldier?.id}`}
                    {r.source!=="soldier"&&`פלוגה ${r.unit||"—"}`}
                    {r.broken&&" · ⚠️ תקול"}
                  </div>
                </div>
              ))}
            </div>
          )}
          {results.byId?.length===0&&results.bySerial?.length===0&&(
            <div style={{textAlign:"center",padding:24,color:"#484f58"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔍</div>
              <div>לא נמצאו תוצאות עבור "{q}"</div>
            </div>
          )}
        </div>
      )}
      {!q.trim()&&(
        <div style={{textAlign:"center",padding:24,color:"#484f58"}}>
          <div style={{fontSize:32,marginBottom:8}}>🔍</div>
          <div style={{fontSize:13}}>חפש לפי מספר אישי, מספר סידורי, או שם חייל</div>
        </div>
      )}
    </Modal>
  );
}

// =================== PERMISSIONS TAB ===================
const PERM_LABELS = {
  canCheckout:"שיוך אמצעים", canReturn:"ביטול שיוך", canSign:"שליחת לינק חתימה",
  canBulkSign:"החתמה מרוכזת", canEdit:"עריכת נתונים", canDownload:"הורדת טפסים",
};
function PermissionsTab({db, setDb}){
  // משתמשים קבועים + דינמיים מ-Firebase
  const staticUsers = Object.entries(USERS).filter(([,u])=>u.role==="manager"||u.role==="admin");
  const dynamicUsers = Object.entries(db.dynamicUsers||{});
  const allUsers = [...staticUsers, ...dynamicUsers.map(([k,u])=>[k,{...u,dynamic:true}])];

  const [showAdd, setShowAdd] = useState(false);
  const [newUser, setNewUser] = useState({username:"",name:"",pass:"",role:"viewer",viewUnit:"הכל"});
  const [err, setErr] = useState("");

  function togglePerm(username, perm, isDynamic){
    const baseRole = isDynamic ? (db.dynamicUsers?.[username]?.role||"viewer") : (USERS[username]?.role||"viewer");
    const base = DEFAULT_PERMS[baseRole]||{};
    const current = db.userPerms?.[username] || {};
    const merged = {...base,...current};
    const newVal = !merged[perm];
    const newPerms = {...(db.userPerms||{}), [username]: {...current, [perm]: newVal}};
    const ndb = {...db, userPerms: newPerms};
    saveDB(ndb); setDb(ndb);
  }

  function addUser(){
    setErr("");
    if(!newUser.username.trim()||!newUser.name.trim()||!newUser.pass.trim()){setErr("יש למלא את כל השדות");return;}
    if(USERS[newUser.username]||db.dynamicUsers?.[newUser.username]){setErr("שם משתמש כבר קיים");return;}
    const u = {name:newUser.name,pass:newUser.pass,role:newUser.role,soldierId:"",viewUnit:newUser.viewUnit,dynamic:true};
    const ndb = {...db, dynamicUsers:{...(db.dynamicUsers||{}),[newUser.username.trim()]:u}};
    saveDB(ndb); setDb(ndb);
    setNewUser({username:"",name:"",pass:"",role:"viewer",viewUnit:"הכל"});
    setShowAdd(false);
  }

  function deleteUser(username){
    if(!window.confirm("למחוק משתמש "+username+"?")) return;
    const newDyn={...db.dynamicUsers}; delete newDyn[username];
    const newPerms={...db.userPerms}; delete newPerms[username];
    const ndb={...db,dynamicUsers:newDyn,userPerms:newPerms};
    saveDB(ndb); setDb(ndb);
  }

  const ROLE_LABELS = {admin:"מנהל ראשי",manager:"מנהל",viewer:"צפייה בלבד"};
  const UNIT_OPTS = ["הכל","א","ב","ג","מסייעת","אגמ","פלסמ"];

  return (
    <div style={{padding:16,maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:16,color:"#c084fc",margin:0}}>🔑 ניהול משתמשים והרשאות</h2>
        <button onClick={()=>setShowAdd(!showAdd)} style={{...S.btn("green"),padding:"7px 14px",fontSize:13}}>
          {showAdd?"✕ ביטול":"＋ הוסף משתמש"}
        </button>
      </div>

      {showAdd&&(
        <div style={{background:"#161b22",border:"1px solid #238636",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#3fb950"}}>➕ הוספת משתמש חדש</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <label style={S.label}>שם משתמש (לכניסה)</label>
              <input value={newUser.username} onChange={e=>setNewUser({...newUser,username:e.target.value})} placeholder="לדוגמא: dani" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>שם מלא</label>
              <input value={newUser.name} onChange={e=>setNewUser({...newUser,name:e.target.value})} placeholder="דני כהן" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>סיסמה</label>
              <input value={newUser.pass} onChange={e=>setNewUser({...newUser,pass:e.target.value})} placeholder="סיסמה" style={S.input}/>
            </div>
            <div>
              <label style={S.label}>תפקיד</label>
              <select value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value})} style={S.input}>
                <option value="viewer">צפייה בלבד</option>
                <option value="manager">מנהל</option>
              </select>
            </div>
            {newUser.role==="viewer"&&(
              <div>
                <label style={S.label}>גישה לפלוגה</label>
                <select value={newUser.viewUnit} onChange={e=>setNewUser({...newUser,viewUnit:e.target.value})} style={S.input}>
                  {UNIT_OPTS.map(u=><option key={u} value={u}>{u==="הכל"?"כל הגדוד":"פלוגה "+u}</option>)}
                </select>
              </div>
            )}
          </div>
          {err&&<div style={{color:"#f85149",fontSize:12,marginBottom:8}}>{err}</div>}
          <button onClick={addUser} style={{...S.btn("green"),width:"100%",padding:"10px 0"}}>שמור משתמש</button>
        </div>
      )}

      {allUsers.map(([username, u])=>{
        const isDynamic = !!u.dynamic;
        const baseRole = u.role||"viewer";
        const base = DEFAULT_PERMS[baseRole]||{};
        const custom = db.userPerms?.[username]||{};
        const merged = {...base,...custom};
        const isAdmin = baseRole==="admin";
        return (
          <div key={username} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:isAdmin?"#2d1f4e":isDynamic?"#1a2a1a":"#1f3a5f",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                {isAdmin?"👑":baseRole==="viewer"?"👁️":"🪖"}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
                <div style={{fontSize:11,color:"#8b949e"}}>{ROLE_LABELS[baseRole]||baseRole} • {username} {isDynamic&&<span style={{color:"#3fb950",fontSize:10}}>● דינמי</span>}</div>
              </div>
              {isDynamic&&(
                <button onClick={()=>deleteUser(username)} style={{...S.btn("red"),padding:"4px 8px",fontSize:11}}>מחק</button>
              )}
            </div>
            {!isAdmin&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {Object.entries(PERM_LABELS).map(([perm,label])=>{
                  const enabled = merged[perm];
                  return (
                    <div key={perm} onClick={()=>togglePerm(username,perm,isDynamic)}
                      style={{display:"flex",alignItems:"center",gap:8,background:"#0d1117",borderRadius:7,padding:"7px 10px",cursor:"pointer",border:`1px solid ${enabled?"#238636":"#30363d"}`}}>
                      <div style={{width:16,height:16,borderRadius:3,background:enabled?"#238636":"#21262d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0,color:"#fff"}}>
                        {enabled?"✓":""}
                      </div>
                      <span style={{fontSize:12,color:enabled?"#3fb950":"#8b949e"}}>{label}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {isAdmin&&<div style={{fontSize:11,color:"#8b949e",textAlign:"center"}}>מנהל ראשי — הרשאות מלאות תמיד</div>}
          </div>
        );
      })}
    </div>
  );
}

// =================== BULK SIGN MODAL (פיצר 2 - דיטור) ===================
function BulkSignModal({db, onSave, onClose, soldiers, auth}){
  const [repSearch,setRepSearch]=React.useState("");
  const [repId,setRepId]=React.useState("");
  const [selectedUnit,setSelectedUnit]=React.useState("הכל");
  const [repSuggestions,setRepSuggestions]=React.useState([]);
  const [sigData,setSigData]=React.useState(null);
  const [showPad,setShowPad]=React.useState(false);
  const [step,setStep]=React.useState("select"); // select, sign, done

  const units=["הכל",...[...new Set(soldiers.map(s=>s.unit))].sort()];
  const targetSoldiers=React.useMemo(()=>{
    let l=soldiers.filter(s=>{
      const weps=Object.entries(s.assigned||{}).filter(([k])=>WEAPON_KEYS.includes(k));
      return weps.length>0 && !db.signatures?.[s.id];
    });
    if(selectedUnit!=="הכל") l=l.filter(s=>s.unit===selectedUnit);
    return l;
  },[soldiers,db.signatures,selectedUnit]);

  function onRepSearch(v){
    setRepSearch(v);setRepId("");
    if(!v.trim()){setRepSuggestions([]);return;}
    const q=v.toLowerCase();
    setRepSuggestions(soldiers.filter(s=>s.name.toLowerCase().includes(q)||s.id.includes(q)).slice(0,6));
  }

  function doSign(sig){
    setSigData(sig);setShowPad(false);setStep("done");
    const signedAt=todayStr()+" "+nowStr();
    const guarantorKey=repId||("bulk_"+Date.now());
    // המר מערכים לאובייקטים (Firebase לא אוהב מערכים)
    const soldiersObj={}; targetSoldiers.forEach(s=>{soldiersObj[s.id]=true;});
    const remainingObj={}; targetSoldiers.forEach(s=>{remainingObj[s.id]=true;});
    const newGuarantors={...(db.bulkGuarantors||{})};
    newGuarantors[guarantorKey]={
      repId,repName:repSearch,sigData:sig,signedAt,
      unit:selectedUnit,
      soldiers:soldiersObj,
      remaining:remainingObj,
    };
    const ndb={...db,bulkGuarantors:newGuarantors};
    onSave(ndb);
  }

  return (
    <Modal title="✍️ החתמה מרוכזת" onClose={onClose} wide>
      {step==="select"&&(
        <div>
          <div style={{background:"#1a2a1a",border:"1px solid #238636",borderRadius:8,padding:12,marginBottom:16,fontSize:13,color:"#3fb950"}}>
            🪖 פיצר זה מאפשר לאדם אחד (כגון אביאל דיטור) לחתום על כל ציוד הפלוגה בחתימה אחת
          </div>

          <label style={S.label}>בחר פלוגה להחתים</label>
          <select value={selectedUnit} onChange={e=>setSelectedUnit(e.target.value)} style={{...S.input}}>
            {units.map(u=><option key={u} value={u}>{u==="הכל"?"כל הפלוגות":"פלוגה "+u}</option>)}
          </select>

          <label style={S.label}>שם החותם (נציג / אחראי)</label>
          <div style={{position:"relative"}}>
            <input value={repSearch} onChange={e=>onRepSearch(e.target.value)} placeholder="הקלד שם..." style={S.input}/>
            {repSuggestions.length>0&&(
              <div style={{position:"absolute",top:"100%",right:0,left:0,background:"#161b22",border:"1px solid #30363d",borderRadius:8,zIndex:100}}>
                {repSuggestions.map(s=>(
                  <div key={s.id} onClick={()=>{setRepSearch(s.name);setRepId(s.id);setRepSuggestions([]);}}
                    style={{padding:"8px 12px",cursor:"pointer",color:"#e6edf3",fontSize:13}}>
                    {s.name} <span style={{color:"#8b949e",fontSize:11}}>({s.id})</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{background:"#0d1117",borderRadius:8,padding:12,marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>⚠️ חיילים שיחתמו ({targetSoldiers.length})</div>
            {targetSoldiers.length===0
              ?<div style={{color:"#8b949e",fontSize:13}}>אין חיילים ממתינים בפלוגה זו</div>
              :<div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                {targetSoldiers.map(s=>(
                  <div key={s.id} style={{fontSize:12,color:"#e6edf3",display:"flex",justifyContent:"space-between"}}>
                    <span>{s.name}</span>
                    <span style={{color:"#8b949e"}}>{Object.keys(s.assigned).filter(k=>WEAPON_KEYS.includes(k)).join(", ")}</span>
                  </div>
                ))}
              </div>
            }
          </div>

          <button onClick={()=>setStep("sign")} disabled={targetSoldiers.length===0||!repSearch.trim()}
            style={{...S.btn("green"),width:"100%",padding:"12px 0",fontSize:15,opacity:targetSoldiers.length===0||!repSearch.trim()?0.5:1}}>
            → המשך לחתימה ({targetSoldiers.length} חיילים)
          </button>
        </div>
      )}
      {step==="sign"&&(
        <div>
          <div style={{...S.card,marginBottom:16,background:"#0d1117"}}>
            <div style={{fontWeight:700,marginBottom:4}}>נציג: {repSearch}</div>
            <div style={{color:"#8b949e",fontSize:13}}>חותם על {targetSoldiers.length} חיילים מ{selectedUnit==="הכל"?"כל הפלוגות":"פלוגה "+selectedUnit}</div>
          </div>
          {!sigData
            ?<div>
              <p style={{color:"#8b949e",fontSize:13,marginBottom:12}}>חתום כאן לאישור קבלת כל האמצעים ברשימה</p>
              <SignaturePad onSave={doSign}/>
              <button onClick={()=>setStep("select")} style={{...S.btn(),width:"100%",marginTop:8}}>← חזור</button>
            </div>
            :<div style={{textAlign:"center"}}><div style={{fontSize:48}}>✅</div><div style={{color:"#3fb950",fontWeight:700}}>נחתם!</div></div>
          }
        </div>
      )}
      {step==="done"&&(
        <div style={{textAlign:"center",padding:24}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <h2 style={{color:"#3fb950",marginBottom:8}}>החתימה המרוכזת התקבלה!</h2>
          <p style={{color:"#8b949e",fontSize:13,marginBottom:20}}>{targetSoldiers.length} חיילים סומנו כחתומים בשם {repSearch}</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>downloadBulkForm(repSearch,repId,selectedUnit,targetSoldiers,sigData,db)} style={{...S.btn("purple"),padding:"10px 20px",fontSize:14}}>⬇️ הורד שובר מרוכז</button>
            <button onClick={onClose} style={{...S.btn("green"),padding:"10px 20px",fontSize:14}}>סגור</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

function App(){
  const [auth,setAuth]=useState(()=>{
    // בדוק אם יש פרמטר ?sign= בURL
    const params=new URLSearchParams(window.location.search);
    const signId=params.get("sign");
    if(signId){
      const s=RAW_SOLDIERS.find(x=>x.id===signId);
      let assignedFromLink={};
      const bParam=params.get("b");
      const dParam=params.get("d");
      const rawParam=bParam||dParam;
      if(rawParam){try{
        const decoded=bParam?atob(bParam):decodeURIComponent(rawParam);
        const compact=JSON.parse(decoded);
        Object.entries(compact).forEach(([k,v])=>{
          const idx=parseInt(k);
          if(!isNaN(idx)&&EQ_COLS[idx]) assignedFromLink[EQ_COLS[idx]]=v;
          else assignedFromLink[k]=v;
        });
      }catch(e){}}
      if(s) return{role:"soldier",name:s.name,soldierId:signId,autoSign:true,assignedFromLink};
      return{role:"soldier",name:"חייל",soldierId:signId,autoSign:true,assignedFromLink};
    }
    // שחזר session שמור
    try{
      const saved=sessionStorage.getItem("armory_session");
      if(saved) return JSON.parse(saved);
    }catch(e){}
    return null;
  });

  function handleLogin(a){
    try{sessionStorage.setItem("armory_session",JSON.stringify(a));}catch(e){}
    setAuth(a);
  }
  function handleLogout(){
    try{sessionStorage.removeItem("armory_session");}catch(e){}
    setAuth(null);
  }

  const [db,setDb]=useState(()=>initDB());
  if(!auth)return<Login onLogin={handleLogin}/>;
  if(auth.role==="soldier")return<SoldierSignView auth={auth} onLogout={handleLogout} db={db} setDb={setDb}/>;
  if(auth.role==="viewer")return<ViewerApp auth={auth} onLogout={handleLogout} db={db}/>;
  return<ManagerApp auth={auth} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
